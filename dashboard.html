<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal GLPI Dashboard</title>

  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f6f8;
    }

    a { color: inherit; }

    .dashboard {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px 18px;
    }

    .wrap {
      width: min(1120px, 100%);
      min-height: calc(100vh - 50px);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .page-title {
      margin: 0;
      color: #111827;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .refresh-area {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .status-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-height: 36px;
      color: #6b7280;
      font-size: 13px;
      text-align: right;
    }

    .status-ok { color: #047857; }
    .status-error { color: #b91c1c; font-weight: 700; }

    .refresh-button {
      flex: 0 0 38px;
      width: 38px;
      min-width: 38px;
      max-width: 38px;
      height: 38px;
      min-height: 38px;
      max-height: 38px;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 0;
      appearance: none;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .refresh-button svg {
      display: block;
      flex: 0 0 19px;
      width: 19px;
      height: 19px;
      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .refresh-button:hover {
      transform: translateY(-1px);
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    .refresh-button:disabled,
    .refresh-button:disabled:hover {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      background: #ffffff;
      color: #111827;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }

    .refresh-button.loading svg {
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card-link {
      min-width: 0;
      text-decoration: none;
      border-radius: 18px;
    }

    .card {
      width: 100%;
      min-height: 120px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .card-link:hover .card {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.13);
    }

    .card-link:focus-visible {
      outline: 3px solid rgba(17, 24, 39, 0.22);
      outline-offset: 3px;
    }

    .card.pulse { animation: card-invert-pulse 2.4s ease-in-out; }
    .card.pulse .stat-title,
    .card.pulse .stat-number { animation: card-text-pulse 2.4s ease-in-out; }

    @keyframes card-invert-pulse {
      0%, 24%, 50%, 100% {
        background: #ffffff;
        border-color: #e5e7eb;
        transform: translateY(0) scale(1);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      12%, 38%, 64% {
        background: #111827;
        border-color: #111827;
        transform: translateY(-4px) scale(1.015);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      }
    }

    @keyframes card-text-pulse {
      0%, 24%, 50%, 100% { color: inherit; }
      12%, 38%, 64% { color: #ffffff; }
    }

    .stat-title {
      margin-bottom: 12px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
    }

    .stat-number {
      color: #111827;
      font-size: 46px;
      line-height: 1;
      font-weight: 800;
    }

    .activities {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 10px;
    }

    .activity-card {
      min-height: 100%;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .activity-title {
      min-height: 40px;
      padding: 10px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .activity-title-link {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-decoration: none;
    }

    .activity-title-link:hover { color: #111827; text-decoration: underline; }
    .activity-title-total { font-variant-numeric: tabular-nums; }

    .activity-progress {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      color: #9ca3af;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: normal;
      text-transform: none;
      font-variant-numeric: tabular-nums;
    }

    .activity-progress[hidden] { display: none; }
    .activity-progress svg { width: 14px; height: 14px; animation: spin 850ms linear infinite; }

    .activity-list {
      flex: 1;
      min-height: 280px;
      overflow: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty { padding: 6px 0; color: #6b7280; font-size: 13px; }

    .parent-task-group {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .parent-task-group.pulse { animation: group-invert-pulse 2.4s ease-in-out; }

    .parent-task-group.pulse .parent-group-header,
    .parent-task-group.pulse .parent-group-link,
    .parent-task-group.pulse .task-row,
    .parent-task-group.pulse .task-meta,
    .parent-task-group.pulse .task-content {
      animation: group-text-pulse 2.4s ease-in-out;
    }

    .parent-task-group.pulse .task-row {
      animation-name: group-text-pulse, task-row-border-pulse;
      animation-duration: 2.4s, 2.4s;
      animation-timing-function: ease-in-out, ease-in-out;
    }

    @keyframes group-invert-pulse {
      0%, 24%, 50%, 100% {
        background: #ffffff;
        border-color: #e5e7eb;
        transform: translateY(0) scale(1);
        box-shadow: none;
      }
      12%, 38%, 64% {
        background: #111827;
        border-color: #111827;
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      }
    }

    @keyframes group-text-pulse {
      0%, 24%, 50%, 100% { color: inherit; }
      12%, 38%, 64% { color: #ffffff; }
    }

    @keyframes task-row-border-pulse {
      0%, 24%, 50%, 100% { border-top-color: #e5e7eb; }
      12%, 38%, 64% { border-top-color: #4b5563; }
    }

    .parent-group-header {
      padding: 10px 11px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .parent-group-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      color: #111827;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .parent-title-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .state-icon {
      --state-color: #9ca3af;
      flex: 0 0 18px;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--state-color);
      line-height: 0;
    }

    .state-icon svg {
      display: block;
      width: 18px;
      height: 18px;
      overflow: visible;
    }

    .parent-task-group.pulse .state-icon {
      animation: group-text-pulse 2.4s ease-in-out;
    }

    .parent-group-link:hover { text-decoration: underline; }
    .task-row { padding: 10px 11px; }
    .task-row + .task-row { border-top: 1px solid #e5e7eb; }

    .task-meta {
      margin-bottom: 6px;
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .task-content {
      padding-left: 24px;
      color: #374151;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 940px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .activities { grid-template-columns: 1fr; }
    }

    @media (max-width: 650px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .refresh-area { width: 100%; justify-content: space-between; }
      .status-area { align-items: flex-start; text-align: left; }
    }

    @media (max-width: 500px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main class="dashboard">
    <div class="wrap">
      <header class="topbar">
        <h1 class="page-title">Personal GLPI Dashboard</h1>

        <div class="refresh-area">
          <div class="status-area">
            <div id="status">Avvio dashboard...</div>
            <div id="countdown">Preparazione aggiornamento...</div>
          </div>

          <button class="refresh-button" id="force-refresh" type="button" aria-label="Aggiorna ora" title="Aggiorna ora">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="cards" aria-label="Stato ticket">
        <a class="card-link" href="/list/totali-aperti">
          <article class="card" id="card-totali-aperti">
            <div class="stat-title">Totali aperti</div>
            <div class="stat-number" id="totali-aperti">0</div>
          </article>
        </a>

        <a class="card-link" href="/list/nuovi-incidenti">
          <article class="card" id="card-nuovi-incidenti">
            <div class="stat-title">Nuovi incidenti</div>
            <div class="stat-number" id="nuovi-incidenti">0</div>
          </article>
        </a>

        <a class="card-link" href="/list/nuove-richieste">
          <article class="card" id="card-nuove-richieste">
            <div class="stat-title">Nuove richieste</div>
            <div class="stat-number" id="nuove-richieste">0</div>
          </article>
        </a>

        <a class="card-link" href="/list/assegnati-a-me">
          <article class="card" id="card-assegnati-a-me">
            <div class="stat-title">Assegnati a me</div>
            <div class="stat-number" id="assegnati-a-me">0</div>
          </article>
        </a>
      </section>

      <section class="activities" aria-label="Attività">
        <article class="activity-card">
          <div class="activity-title">
            <a class="activity-title-link" href="/list/chiamate">
              Attività chiamate - <span class="activity-title-total" id="total-chiamate">0</span>
            </a>
            <span class="activity-progress" id="progress-chiamate" aria-live="polite" hidden>
              <span id="progress-chiamate-text">0/0</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"/>
              </svg>
            </span>
          </div>
          <div class="activity-list" id="tasks-chiamate">
            <div class="empty">Caricamento attività...</div>
          </div>
        </article>

        <article class="activity-card">
          <div class="activity-title">
            <a class="activity-title-link" href="/list/problemi">
              Attività problemi - <span class="activity-title-total" id="total-problemi">0</span>
            </a>
            <span class="activity-progress" id="progress-problemi" aria-live="polite" hidden>
              <span id="progress-problemi-text">0/0</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"/>
              </svg>
            </span>
          </div>
          <div class="activity-list" id="tasks-problemi">
            <div class="empty">Caricamento attività...</div>
          </div>
        </article>

        <article class="activity-card">
          <div class="activity-title">
            <a class="activity-title-link" href="/list/cambiamenti">
              Attività cambiamenti - <span class="activity-title-total" id="total-cambiamenti">0</span>
            </a>
            <span class="activity-progress" id="progress-cambiamenti" aria-live="polite" hidden>
              <span id="progress-cambiamenti-text">0/0</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"/>
              </svg>
            </span>
          </div>
          <div class="activity-list" id="tasks-cambiamenti">
            <div class="empty">Caricamento attività...</div>
          </div>
        </article>
      </section>
    </div>
  </main>

  <script>
    const configuredRefreshSeconds = Number("__AUTO_REFRESH_SECONDS__");
    const REFRESH_SECONDS = Number.isFinite(configuredRefreshSeconds) && configuredRefreshSeconds >= 10
      ? configuredRefreshSeconds
      : 60;
    const REFRESH_MS = REFRESH_SECONDS * 1000;
    const CATEGORIES = ["chiamate", "problemi", "cambiamenti"];
    const CACHE_KEY = "personal-glpi-dashboard-cache-v4";
    const CACHE_VERSION = 4;

    let nextRefreshAt = Date.now() + REFRESH_MS;
    let refreshTimer = null;
    let isRefreshing = false;

    const previous = {
      totaleAperti: null,
      nuoviIncidenti: null,
      nuoveRichieste: null,
      assegnatiAMe: null,
      taskIdsByParent: {
        chiamate: null,
        problemi: null,
        cambiamenti: null
      }
    };

    function createEmptyCache() {
      return {
        version: CACHE_VERSION,
        stats: null,
        totals: {
          chiamate: 0,
          problemi: 0,
          cambiamenti: 0
        },
        tasks: {
          chiamate: [],
          problemi: [],
          cambiamenti: []
        },
        lists: {},
        listUpdatedAt: {},
        categoryUpdatedAt: {},
        aggiornatoAlle: null,
        lastFullRefreshAt: 0
      };
    }

    function readCache() {
      try {
        const raw = window.sessionStorage.getItem(CACHE_KEY);
        if (!raw) return null;

        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== CACHE_VERSION) return null;

        return parsed;
      } catch (error) {
        console.warn("Impossibile leggere la cache dashboard", error);
        return null;
      }
    }

    let dashboardCache = readCache() || createEmptyCache();

    function saveCache() {
      try {
        window.sessionStorage.setItem(
          CACHE_KEY,
          JSON.stringify(dashboardCache)
        );
      } catch (error) {
        console.warn("Impossibile salvare la cache dashboard", error);
      }
    }


    const STATUS_ICON_CONFIG = {
      ticket: {
        1:  { icon: "circle-filled", color: "#2fb344", label: "Nuova" },
        10: { icon: "help-circle", color: "#74a7f8", label: "Convalida" },
        2:  { icon: "circle", color: "#2fb344", label: "In lavorazione (assegnata)" },
        3:  { icon: "calendar", color: "#174ea6", label: "In lavorazione (pianificata)" },
        4:  { icon: "circle-filled", color: "#ff9800", label: "In sospeso" },
        5:  { icon: "circle", color: "#000000", label: "Risolto" },
        6:  { icon: "circle-filled", color: "#000000", label: "Chiusa" }
      },
      problem: {
        1: { icon: "circle-filled", color: "#2fb344", label: "Nuova" },
        7: { icon: "check-filled", color: "#008a1f", label: "Accettato" },
        2: { icon: "circle", color: "#2fb344", label: "In lavorazione (assegnata)" },
        3: { icon: "calendar", color: "#174ea6", label: "In lavorazione (pianificata)" },
        4: { icon: "circle-filled", color: "#ff9800", label: "In sospeso" },
        5: { icon: "circle", color: "#000000", label: "Risolto" },
        8: { icon: "eye", color: "#000000", label: "Sotto osservazione" },
        6: { icon: "circle-filled", color: "#000000", label: "Chiusa" }
      },
      change: {
        1:  { icon: "circle-filled", color: "#2fb344", label: "Nuova" },
        9:  { icon: "circle", color: "#8ecae6", label: "Valutazione" },
        10: { icon: "help-circle", color: "#74a7f8", label: "Convalida" },
        7:  { icon: "check-filled", color: "#008a1f", label: "Accettato" },
        4:  { icon: "circle-filled", color: "#ff9800", label: "In sospeso" },
        11: { icon: "help-circle", color: "#ff8a00", label: "Analisi" },
        12: { icon: "circle", color: "#ff9800", label: "Qualificazione" },
        5:  { icon: "circle", color: "#000000", label: "Applicata" },
        8:  { icon: "eye", color: "#000000", label: "Revisione" },
        6:  { icon: "circle-filled", color: "#000000", label: "Chiusa" },
        14: { icon: "ban", color: "#000000", label: "Cancellato" },
        13: { icon: "circle-x", color: "#e8590c", label: "Rifiutato" }
      }
    };

    const STATUS_ICON_SVG = {
      "circle-filled": '<circle cx="12" cy="12" r="8" fill="currentColor"></circle>',
      "circle": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"></circle>',
      "help-circle": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M9.75 9.4a2.45 2.45 0 1 1 3.65 2.13c-.9.5-1.4.92-1.4 1.97" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><circle cx="12" cy="16.6" r="1" fill="currentColor"></circle>',
      "calendar": '<rect x="4.5" y="5.5" width="15" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect><path d="M8 3.5v4M16 3.5v4M4.5 9.5h15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><rect x="8" y="12.5" width="3" height="3" rx=".5" fill="currentColor"></rect>',
      "check-filled": '<circle cx="12" cy="12" r="8" fill="currentColor"></circle><path d="m8.5 12.2 2.2 2.2 4.8-5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>',
      "eye": '<path d="M3.8 12s3-5 8.2-5 8.2 5 8.2 5-3 5-8.2 5-8.2-5-8.2-5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><circle cx="12" cy="12" r="2.2" fill="none" stroke="currentColor" stroke-width="1.8"></circle>',
      "ban": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="m6.4 6.4 11.2 11.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
      "circle-x": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="m9.2 9.2 5.6 5.6m0-5.6-5.6 5.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>'
    };

    function normalizeItemKind(kind) {
      const value = String(kind || "").trim().toLowerCase();
      if (value === "chiamate" || value === "ticket") return "ticket";
      if (value === "problemi" || value === "problem") return "problem";
      if (value === "cambiamenti" || value === "change") return "change";
      return value;
    }

    function findStatusDefinition(kind, statusId, statusText) {
      const normalizedKind = normalizeItemKind(kind);
      const numericId = Number(statusId);
      const byId = STATUS_ICON_CONFIG[normalizedKind] || {};

      if (Number.isFinite(numericId) && byId[numericId]) {
        return byId[numericId];
      }

      const normalizedText = String(statusText || "").trim().toLowerCase();
      for (const definition of Object.values(byId)) {
        if (definition.label.toLowerCase() === normalizedText) {
          return definition;
        }
      }

      return {
        icon: "circle",
        color: "#9ca3af",
        label: statusText || "Stato sconosciuto"
      };
    }

    function createStatusIcon(kind, statusId, statusText) {
      const definition = findStatusDefinition(kind, statusId, statusText);
      const wrapper = document.createElement("span");
      wrapper.className = "state-icon";
      wrapper.style.setProperty("--state-color", definition.color);
      wrapper.title = statusText || definition.label;
      wrapper.setAttribute("role", "img");
      wrapper.setAttribute("aria-label", statusText || definition.label);

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("aria-hidden", "true");
      svg.innerHTML = STATUS_ICON_SVG[definition.icon] || STATUS_ICON_SVG.circle;
      wrapper.appendChild(svg);

      return wrapper;
    }

    function nowText() {
      return new Date().toLocaleTimeString("it-IT", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function setStatus(message, type) {
      const element = document.getElementById("status");
      element.textContent = message;
      element.className = "";
      if (type === "ok") element.classList.add("status-ok");
      if (type === "error") element.classList.add("status-error");
    }

    function setRefreshButtonLoading(isLoading) {
      const button = document.getElementById("force-refresh");
      button.disabled = isLoading;
      button.classList.toggle("loading", isLoading);
    }

    function mergeTotalsPatch(patch) {
      if (!patch || typeof patch !== "object") return;

      dashboardCache.totals = dashboardCache.totals || {};

      for (const category of CATEGORIES) {
        if (Object.prototype.hasOwnProperty.call(patch, category)) {
          dashboardCache.totals[category] = Number(patch[category]) || 0;
        }
      }
    }

    function mergeListViews(listViews, timestamp = Date.now()) {
      if (!listViews || typeof listViews !== "object") return;

      dashboardCache.lists = dashboardCache.lists || {};
      dashboardCache.listUpdatedAt = dashboardCache.listUpdatedAt || {};

      for (const [view, items] of Object.entries(listViews)) {
        dashboardCache.lists[view] = Array.isArray(items) ? items : [];
        dashboardCache.listUpdatedAt[view] = timestamp;
      }
    }

    function setActivityTotals(totals) {
      const values = totals || {};
      document.getElementById("total-chiamate").textContent = String(Number(values.chiamate) || 0);
      document.getElementById("total-problemi").textContent = String(Number(values.problemi) || 0);
      document.getElementById("total-cambiamenti").textContent = String(Number(values.cambiamenti) || 0);
    }

    function showProgress(category, completed, total) {
      const progress = document.getElementById("progress-" + category);
      const text = document.getElementById("progress-" + category + "-text");
      if (!progress || !text) return;

      progress.hidden = false;
      text.textContent = String(Number(completed) || 0) + "/" + String(Number(total) || 0);
    }

    function hideProgress(category) {
      const progress = document.getElementById("progress-" + category);
      if (progress) progress.hidden = true;
    }

    function hideAllProgress() {
      CATEGORIES.forEach(hideProgress);
    }

    function pulseElement(element) {
      element.classList.remove("pulse");
      void element.offsetWidth;
      element.classList.add("pulse");
    }

    function setCard(numberId, cardId, key, value) {
      const numberElement = document.getElementById(numberId);
      const cardElement = document.getElementById(cardId);
      const nextValue = Number.isFinite(Number(value)) ? Number(value) : 0;

      if (previous[key] !== null && previous[key] !== nextValue) {
        pulseElement(cardElement);
      }

      previous[key] = nextValue;
      numberElement.textContent = String(nextValue);
    }

    function applyStats(stats) {
      if (!stats) return;

      setCard("totali-aperti", "card-totali-aperti", "totaleAperti", stats.totaleTicketAperti);
      setCard("nuovi-incidenti", "card-nuovi-incidenti", "nuoviIncidenti", stats.nuoviIncidenti);
      setCard("nuove-richieste", "card-nuove-richieste", "nuoveRichieste", stats.nuoveRichieste);
      setCard("assegnati-a-me", "card-assegnati-a-me", "assegnatiAMe", stats.assegnatiAMe);
    }

    function updateCountdown() {
      const remainingMs = Math.max(0, nextRefreshAt - Date.now());
      const remainingSeconds = Math.ceil(remainingMs / 1000);

      document.getElementById("countdown").textContent =
        "Prossimo aggiornamento tra " + remainingSeconds + " secondi";
    }

    function scheduleNextRefresh(delayMs = REFRESH_MS) {
      const safeDelay = Math.max(0, Number(delayMs) || 0);
      nextRefreshAt = Date.now() + safeDelay;

      if (refreshTimer) window.clearTimeout(refreshTimer);
      refreshTimer = window.setTimeout(() => aggiornaDashboard("timer"), safeDelay);
      updateCountdown();
    }

    function forceRefresh() {
      if (isRefreshing) return;

      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
        refreshTimer = null;
      }

      aggiornaDashboard("manuale");
    }

    async function readErrorDetails(response) {
      try {
        const contentType = response.headers.get("content-type") || "";
        return contentType.includes("application/json")
          ? await response.json()
          : await response.text();
      } catch (error) {
        return "Impossibile leggere il dettaglio errore: " + error.message;
      }
    }

    function groupTasksByParent(category, tasks) {
      const groups = new Map();
      if (!Array.isArray(tasks)) return groups;

      for (const task of tasks) {
        const parentKey = String(task.parentId);

        if (!groups.has(parentKey)) {
          groups.set(parentKey, {
            parentId: task.parentId,
            parentTitle: task.parentTitle,
            parentUrl: task.parentUrl,
            parentKind: task.parentKind || category,
            parentStatusId: task.parentStatusId,
            parentStatusText: task.parentStatusText,
            tasks: []
          });
        }

        groups.get(parentKey).tasks.push(task);
      }

      return groups;
    }

    function getTaskIdsByParent(groups) {
      const result = new Map();

      for (const [parentKey, group] of groups.entries()) {
        result.set(
          parentKey,
          new Set(group.tasks.map(task => String(task.taskId)))
        );
      }

      return result;
    }

    function getParentsWithNewTasks(category, nextTaskIdsByParent) {
      const changedParents = new Set();
      const oldMap = previous.taskIdsByParent[category];

      if (oldMap === null) return changedParents;

      for (const [parentKey, nextTaskIds] of nextTaskIdsByParent.entries()) {
        const oldTaskIds = oldMap.get(parentKey) || new Set();

        for (const taskId of nextTaskIds) {
          if (!oldTaskIds.has(taskId)) {
            changedParents.add(parentKey);
            break;
          }
        }
      }

      return changedParents;
    }

    function renderActivityTasks(category, tasks) {
      const container = document.getElementById("tasks-" + category);
      const groups = groupTasksByParent(category, tasks);
      const nextTaskIdsByParent = getTaskIdsByParent(groups);
      const parentsWithNewTasks = getParentsWithNewTasks(category, nextTaskIdsByParent);

      container.innerHTML = "";

      if (groups.size === 0) {
        container.innerHTML = '<div class="empty">Nessuna attività trovata</div>';
        previous.taskIdsByParent[category] = nextTaskIdsByParent;
        return;
      }

      for (const [parentKey, group] of groups.entries()) {
        const groupElement = document.createElement("div");
        groupElement.className = "parent-task-group";

        const header = document.createElement("div");
        header.className = "parent-group-header";

        const link = document.createElement("a");
        link.className = "parent-group-link";
        link.href = group.parentUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";

        link.appendChild(
          createStatusIcon(
            group.parentKind || category,
            group.parentStatusId,
            group.parentStatusText
          )
        );

        const titleText = document.createElement("span");
        titleText.className = "parent-title-text";
        titleText.textContent = "#" + group.parentId + " - " + (group.parentTitle || "(senza titolo)");
        link.appendChild(titleText);

        header.appendChild(link);
        groupElement.appendChild(header);

        for (const task of group.tasks) {
          const row = document.createElement("div");
          row.className = "task-row";

          const meta = document.createElement("div");
          meta.className = "task-meta";
          meta.textContent = "Task #" + task.taskId + " · " + (task.taskDate || "data sconosciuta");

          const content = document.createElement("div");
          content.className = "task-content";
          content.textContent = task.content || "(senza contenuto)";

          row.appendChild(meta);
          row.appendChild(content);
          groupElement.appendChild(row);
        }

        container.appendChild(groupElement);

        if (parentsWithNewTasks.has(parentKey)) {
          pulseElement(groupElement);
        }
      }

      previous.taskIdsByParent[category] = nextTaskIdsByParent;
    }

    function applyCachedDashboard() {
      if (dashboardCache.stats) applyStats(dashboardCache.stats);
      setActivityTotals(dashboardCache.totals);

      const tasks = dashboardCache.tasks || {};
      for (const category of CATEGORIES) {
        renderActivityTasks(category, Array.isArray(tasks[category]) ? tasks[category] : []);
      }
    }

    function hasUsableCache() {
      return Boolean(
        dashboardCache &&
        dashboardCache.version === CACHE_VERSION &&
        dashboardCache.stats &&
        dashboardCache.tasks &&
        dashboardCache.lists
      );
    }

    function absorbFullDashboard(data) {
      if (!data || typeof data !== "object") return;

      if (data.stats) dashboardCache.stats = data.stats;
      if (data.totals) dashboardCache.totals = data.totals;

      dashboardCache.tasks = dashboardCache.tasks || {};
      for (const category of CATEGORIES) {
        dashboardCache.tasks[category] = Array.isArray(data[category]) ? data[category] : [];
        dashboardCache.categoryUpdatedAt[category] = Date.now();
      }

      mergeListViews(data.lists, Date.now());

      dashboardCache.aggiornatoAlle = data.aggiornatoAlle || nowText();
      dashboardCache.lastFullRefreshAt = Date.now();
      saveCache();
    }

    async function fetchDashboardFallback() {
      const response = await fetch("/api/dashboard?ts=" + Date.now(), {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        const details = await readErrorDetails(response);
        throw {
          message: "HTTP " + response.status + " " + response.statusText,
          details
        };
      }

      const data = await response.json();
      absorbFullDashboard(data);
      applyCachedDashboard();
      return data;
    }

    async function fetchDashboardStream() {
      const response = await fetch("/api/dashboard/stream?ts=" + Date.now(), {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        const details = await readErrorDetails(response);
        throw {
          message: "HTTP " + response.status + " " + response.statusText,
          details
        };
      }

      if (!response.body || !response.body.getReader) {
        return await fetchDashboardFallback();
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      let finalResult = null;

      function processLine(line) {
        const trimmed = line.trim();
        if (!trimmed) return;

        const event = JSON.parse(trimmed);

        if (event.type === "refreshStart") {
          return;
        }

        if (event.type === "categoryStart") {
          if (event.stats) {
            dashboardCache.stats = event.stats;
            applyStats(event.stats);
          }

          mergeTotalsPatch(event.totalsPatch);
          setActivityTotals(dashboardCache.totals);
          mergeListViews(event.listViews, Date.now());
          saveCache();

          showProgress(event.category, 0, event.total || 0);
          return;
        }

        if (event.type === "progress") {
          showProgress(event.category, event.completed || 0, event.total || 0);
          return;
        }

        if (event.type === "categoryResult") {
          const items = Array.isArray(event.items) ? event.items : [];

          dashboardCache.tasks = dashboardCache.tasks || {};
          dashboardCache.categoryUpdatedAt = dashboardCache.categoryUpdatedAt || {};
          dashboardCache.tasks[event.category] = items;
          dashboardCache.categoryUpdatedAt[event.category] = Date.now();

          renderActivityTasks(event.category, items);
          hideProgress(event.category);
          saveCache();
          return;
        }

        if (event.type === "result") {
          finalResult = event.data;
          return;
        }

        if (event.type === "error") {
          throw new Error(event.message || "Errore durante il caricamento attività");
        }
      }

      while (true) {
        const chunk = await reader.read();
        if (chunk.done) break;

        buffer += decoder.decode(chunk.value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          processLine(line);
        }
      }

      buffer += decoder.decode();
      if (buffer.trim()) processLine(buffer);

      if (!finalResult) {
        throw new Error("La risposta non contiene il risultato finale");
      }

      absorbFullDashboard(finalResult);
      return finalResult;
    }

    async function aggiornaDashboard(source) {
      if (isRefreshing) return;

      isRefreshing = true;
      setRefreshButtonLoading(true);

      try {
        setStatus("Aggiornamento in corso...", "info");
        const dashboardData = await fetchDashboardStream();

        setStatus(
          "Aggiornato alle " + (dashboardData.aggiornatoAlle || nowText()),
          "ok"
        );
      } catch (error) {
        const message = error && error.message ? error.message : String(error);
        console.error("Errore aggiornamento dashboard", error);
        setStatus("Errore aggiornamento: " + message, "error");
      } finally {
        hideAllProgress();
        isRefreshing = false;
        setRefreshButtonLoading(false);
        scheduleNextRefresh();
      }
    }

    function getNavigationType() {
      const entries = performance.getEntriesByType
        ? performance.getEntriesByType("navigation")
        : [];

      return entries.length ? entries[0].type : "navigate";
    }

    function initializeDashboard() {
      const navigationType = getNavigationType();
      const cacheAvailable = hasUsableCache();

      if (cacheAvailable) {
        applyCachedDashboard();
        setStatus(
          "Dati disponibili alle " + (dashboardCache.aggiornatoAlle || nowText()),
          "ok"
        );
      }

      // A real browser reload always refreshes GLPI data. Normal route navigation
      // reuses sessionStorage and avoids another expensive dashboard scan.
      if (navigationType === "reload" || !cacheAvailable) {
        aggiornaDashboard("iniziale");
        return;
      }

      const age = Date.now() - Number(dashboardCache.lastFullRefreshAt || 0);
      const remaining = Math.max(0, REFRESH_MS - age);

      if (remaining === 0) {
        aggiornaDashboard("timer");
      } else {
        scheduleNextRefresh(remaining);
      }
    }

    document.getElementById("force-refresh").addEventListener("click", forceRefresh);
    window.setInterval(updateCountdown, 500);

    window.addEventListener("pageshow", function (event) {
      if (!event.persisted) return;

      const latestCache = readCache();
      if (!latestCache) return;

      dashboardCache = latestCache;
      applyCachedDashboard();
    });

    initializeDashboard();
  </script>
</body>
</html>
