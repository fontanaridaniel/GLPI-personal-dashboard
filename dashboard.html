<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard GLPI</title>

  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f6f8;
    }

    .dashboard {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px 18px;
    }

    .wrap {
      width: min(1120px, 100%);
      min-height: calc(100vh - 50px);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }

    .topbar {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .status-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-height: 36px;
      color: #6b7280;
      font-size: 13px;
      text-align: right;
    }

    .status-ok {
      color: #047857;
    }

    .status-error {
      color: #b91c1c;
      font-weight: 700;
    }

    .refresh-button {
      width: 38px;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        background 160ms ease,
        color 160ms ease;
    }

    .refresh-button:hover {
      transform: translateY(-1px);
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    .refresh-button:active {
      transform: translateY(0);
    }

    .refresh-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .refresh-button.loading svg {
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      width: 100%;
      min-height: 120px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        background-color 180ms ease,
        border-color 180ms ease;
    }

    .card.pulse {
      animation: card-invert-pulse 2.4s ease-in-out;
    }

    .card.pulse .stat-title,
    .card.pulse .stat-number {
      animation: card-text-pulse 2.4s ease-in-out;
    }

    @keyframes card-invert-pulse {
      0%, 24%, 50%, 100% {
        background: #ffffff;
        border-color: #e5e7eb;
        transform: translateY(0) scale(1);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      12%, 38%, 64% {
        background: #111827;
        border-color: #111827;
        transform: translateY(-4px) scale(1.015);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      }
    }

    @keyframes card-text-pulse {
      0%, 24%, 50%, 100% { color: inherit; }
      12%, 38%, 64% { color: #ffffff; }
    }

    .stat-title {
      margin-bottom: 12px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
    }

    .stat-number {
      color: #111827;
      font-size: 46px;
      line-height: 1;
      font-weight: 800;
    }

    .activities {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 10px;
    }

    .activity-card {
      min-height: 100%;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .activity-title {
      min-height: 40px;
      padding: 10px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .activity-title-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .activity-title-total {
      font-variant-numeric: tabular-nums;
    }

    .activity-progress {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      color: #9ca3af;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: normal;
      text-transform: none;
      font-variant-numeric: tabular-nums;
    }

    .activity-progress[hidden] {
      display: none;
    }

    .activity-progress svg {
      width: 14px;
      height: 14px;
      animation: spin 850ms linear infinite;
    }

    .activity-list {
      flex: 1;
      min-height: 280px;
      overflow: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      padding: 6px 0;
      color: #6b7280;
      font-size: 13px;
    }

    .parent-task-group {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        background-color 180ms ease,
        border-color 180ms ease;
    }

    .parent-task-group.pulse {
      animation: group-invert-pulse 2.4s ease-in-out;
    }

    .parent-task-group.pulse .parent-group-header,
    .parent-task-group.pulse .parent-group-link,
    .parent-task-group.pulse .task-row,
    .parent-task-group.pulse .task-meta,
    .parent-task-group.pulse .task-content {
      animation: group-text-pulse 2.4s ease-in-out;
    }

    .parent-task-group.pulse .task-row {
      animation-name: group-text-pulse, task-row-border-pulse;
      animation-duration: 2.4s, 2.4s;
      animation-timing-function: ease-in-out, ease-in-out;
    }

    @keyframes group-invert-pulse {
      0%, 24%, 50%, 100% {
        background: #ffffff;
        border-color: #e5e7eb;
        transform: translateY(0) scale(1);
        box-shadow: none;
      }

      12%, 38%, 64% {
        background: #111827;
        border-color: #111827;
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      }
    }

    @keyframes group-text-pulse {
      0%, 24%, 50%, 100% { color: inherit; }
      12%, 38%, 64% { color: #ffffff; }
    }

    @keyframes task-row-border-pulse {
      0%, 24%, 50%, 100% { border-top-color: #e5e7eb; }
      12%, 38%, 64% { border-top-color: #4b5563; }
    }

    .parent-group-header {
      padding: 10px 11px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .parent-group-link {
      display: inline-block;
      color: #111827;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .parent-group-link:hover {
      text-decoration: underline;
    }

    .task-row {
      padding: 10px 11px;
    }

    .task-row + .task-row {
      border-top: 1px solid #e5e7eb;
    }

    .task-meta {
      margin-bottom: 6px;
      color: #6b7280;
      font-size: 12px;
    }

    .task-content {
      color: #374151;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 940px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .activities {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 500px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main class="dashboard">
    <div class="wrap">
      <div class="topbar">
        <div class="status-area">
          <div id="status">Avvio dashboard...</div>
          <div id="countdown">Preparazione aggiornamento...</div>
        </div>

        <button
          class="refresh-button"
          id="force-refresh"
          type="button"
          aria-label="Aggiorna ora"
          title="Aggiorna ora"
        >
          <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"
            />
          </svg>
        </button>
      </div>

      <section class="cards" aria-label="Stato ticket">
        <article class="card" id="card-totali-aperti">
          <div class="stat-title">Totali aperti</div>
          <div class="stat-number" id="totali-aperti">0</div>
        </article>

        <article class="card" id="card-nuovi-incidenti">
          <div class="stat-title">Nuovi incidenti</div>
          <div class="stat-number" id="nuovi-incidenti">0</div>
        </article>

        <article class="card" id="card-nuove-richieste">
          <div class="stat-title">Nuove richieste</div>
          <div class="stat-number" id="nuove-richieste">0</div>
        </article>

        <article class="card" id="card-assegnati-a-me">
          <div class="stat-title">Assegnati a me</div>
          <div class="stat-number" id="assegnati-a-me">0</div>
        </article>
      </section>

      <section class="activities" aria-label="Attività">
        <article class="activity-card">
          <div class="activity-title">
            <span class="activity-title-label">
              Attività chiamate -
              <span class="activity-title-total" id="total-chiamate">0</span>
            </span>

            <span
              class="activity-progress"
              id="progress-chiamate"
              aria-live="polite"
              hidden
            >
              <span id="progress-chiamate-text">0/0</span>

              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"
                />
              </svg>
            </span>
          </div>

          <div class="activity-list" id="tasks-chiamate">
            <div class="empty">Caricamento attività...</div>
          </div>
        </article>

        <article class="activity-card">
          <div class="activity-title">
            <span class="activity-title-label">
              Attività problemi -
              <span class="activity-title-total" id="total-problemi">0</span>
            </span>

            <span
              class="activity-progress"
              id="progress-problemi"
              aria-live="polite"
              hidden
            >
              <span id="progress-problemi-text">0/0</span>

              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"
                />
              </svg>
            </span>
          </div>

          <div class="activity-list" id="tasks-problemi">
            <div class="empty">Caricamento attività...</div>
          </div>
        </article>

        <article class="activity-card">
          <div class="activity-title">
            <span class="activity-title-label">
              Attività cambiamenti -
              <span class="activity-title-total" id="total-cambiamenti">0</span>
            </span>
          </div>

          <div class="activity-list" id="tasks-cambiamenti">
            <div class="empty">Nessuna attività trovata</div>
          </div>
        </article>
      </section>
    </div>
  </main>

  <script>
    const configuredRefreshSeconds = Number("__AUTO_REFRESH_SECONDS__");

    const REFRESH_SECONDS =
      Number.isFinite(configuredRefreshSeconds) &&
      configuredRefreshSeconds >= 10
        ? configuredRefreshSeconds
        : 60;

    const REFRESH_MS = REFRESH_SECONDS * 1000;

    let nextRefreshAt = Date.now() + REFRESH_MS;
    let refreshTimer = null;
    let isRefreshing = false;

    const previous = {
      totaleAperti: null,
      nuoviIncidenti: null,
      nuoveRichieste: null,
      assegnatiAMe: null,
      taskIdsByParent: {
        chiamate: null,
        problemi: null
      }
    };

    function nowText() {
      return new Date().toLocaleTimeString("it-IT", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function setStatus(message, type) {
      const statusEl = document.getElementById("status");

      statusEl.textContent = message;
      statusEl.className = "";

      if (type === "ok") {
        statusEl.classList.add("status-ok");
      }

      if (type === "error") {
        statusEl.classList.add("status-error");
      }
    }

    function setRefreshButtonLoading(isLoading) {
      const button = document.getElementById("force-refresh");

      button.disabled = isLoading;
      button.classList.toggle("loading", isLoading);
    }

    function setActivityTotals(totals) {
      const values = totals || {};

      document.getElementById("total-chiamate").textContent =
        String(Number(values.chiamate) || 0);

      document.getElementById("total-problemi").textContent =
        String(Number(values.problemi) || 0);

      document.getElementById("total-cambiamenti").textContent =
        String(Number(values.cambiamenti) || 0);
    }

    function showProgress(category, completed, total) {
      const progress = document.getElementById(
        "progress-" + category
      );

      const text = document.getElementById(
        "progress-" + category + "-text"
      );

      if (!progress || !text) {
        return;
      }

      progress.hidden = false;

      text.textContent =
        String(Number(completed) || 0) +
        "/" +
        String(Number(total) || 0);
    }

    function hideProgress(category) {
      const progress = document.getElementById(
        "progress-" + category
      );

      if (progress) {
        progress.hidden = true;
      }
    }

    function hideAllProgress() {
      hideProgress("chiamate");
      hideProgress("problemi");
    }

    function pulseElement(element) {
      element.classList.remove("pulse");
      void element.offsetWidth;
      element.classList.add("pulse");
    }

    function setCard(numberId, cardId, key, value) {
      const numberEl = document.getElementById(numberId);
      const cardEl = document.getElementById(cardId);

      const nextValue = Number.isFinite(Number(value))
        ? Number(value)
        : 0;

      if (
        previous[key] !== null &&
        previous[key] !== nextValue
      ) {
        pulseElement(cardEl);
      }

      previous[key] = nextValue;
      numberEl.textContent = String(nextValue);
    }

    function applyStats(stats) {
      if (!stats) {
        return;
      }

      setCard(
        "totali-aperti",
        "card-totali-aperti",
        "totaleAperti",
        stats.totaleTicketAperti
      );

      setCard(
        "nuovi-incidenti",
        "card-nuovi-incidenti",
        "nuoviIncidenti",
        stats.nuoviIncidenti
      );

      setCard(
        "nuove-richieste",
        "card-nuove-richieste",
        "nuoveRichieste",
        stats.nuoveRichieste
      );

      setCard(
        "assegnati-a-me",
        "card-assegnati-a-me",
        "assegnatiAMe",
        stats.assegnatiAMe
      );
    }

    function updateCountdown() {
      const countdownEl = document.getElementById("countdown");

      const remainingMs = Math.max(
        0,
        nextRefreshAt - Date.now()
      );

      const remainingSeconds = Math.ceil(
        remainingMs / 1000
      );

      countdownEl.textContent =
        "Prossimo aggiornamento tra " +
        remainingSeconds +
        " secondi";
    }

    function scheduleNextRefresh() {
      nextRefreshAt = Date.now() + REFRESH_MS;

      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
      }

      refreshTimer = window.setTimeout(function () {
        aggiornaDashboard("timer");
      }, REFRESH_MS);

      updateCountdown();
    }

    function forceRefresh() {
      if (isRefreshing) {
        return;
      }

      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
        refreshTimer = null;
      }

      aggiornaDashboard("manuale");
    }

    async function readErrorDetails(response) {
      const contentType =
        response.headers.get("content-type") || "";

      try {
        if (contentType.includes("application/json")) {
          return await response.json();
        }

        return await response.text();
      }
      catch (error) {
        return (
          "Impossibile leggere il dettaglio errore: " +
          error.message
        );
      }
    }

    function normalizeParent(task) {
      return {
        parentId:
          task.parentId ??
          task.ticketId ??
          task.problemId ??
          task.changeId,

        parentTitle:
          task.parentTitle ??
          task.ticketTitle ??
          task.problemTitle ??
          task.changeTitle,

        parentUrl:
          task.parentUrl ??
          task.ticketUrl ??
          task.problemUrl ??
          task.changeUrl
      };
    }

    function groupTasksByParent(tasks) {
      const groups = new Map();

      if (!Array.isArray(tasks)) {
        return groups;
      }

      for (const task of tasks) {
        const parent = normalizeParent(task);
        const parentKey = String(parent.parentId);

        if (!groups.has(parentKey)) {
          groups.set(parentKey, {
            parentId: parent.parentId,
            parentTitle: parent.parentTitle,
            parentUrl: parent.parentUrl,
            tasks: []
          });
        }

        groups.get(parentKey).tasks.push(task);
      }

      return groups;
    }

    function getTaskIdsByParent(groups) {
      const result = new Map();

      for (const [parentKey, group] of groups.entries()) {
        result.set(
          parentKey,
          new Set(
            group.tasks.map(function (task) {
              return String(task.taskId);
            })
          )
        );
      }

      return result;
    }

    function getParentsWithNewTasks(
      category,
      nextTaskIdsByParent
    ) {
      const parentsWithNewTasks = new Set();
      const oldMap = previous.taskIdsByParent[category];

      if (oldMap === null) {
        return parentsWithNewTasks;
      }

      for (
        const [parentKey, nextTaskIds]
        of nextTaskIdsByParent.entries()
      ) {
        const previousTaskIds =
          oldMap.get(parentKey) || new Set();

        for (const taskId of nextTaskIds.values()) {
          if (!previousTaskIds.has(taskId)) {
            parentsWithNewTasks.add(parentKey);
            break;
          }
        }
      }

      return parentsWithNewTasks;
    }

    function renderActivityTasks(category, tasks) {
      const container = document.getElementById(
        "tasks-" + category
      );

      const groups = groupTasksByParent(tasks);

      const nextTaskIdsByParent =
        getTaskIdsByParent(groups);

      const parentsWithNewTasks =
        getParentsWithNewTasks(
          category,
          nextTaskIdsByParent
        );

      container.innerHTML = "";

      if (groups.size === 0) {
        container.innerHTML =
          '<div class="empty">Nessuna attività trovata</div>';

        previous.taskIdsByParent[category] =
          nextTaskIdsByParent;

        return;
      }

      for (
        const [parentKey, group]
        of groups.entries()
      ) {
        const groupEl = document.createElement("div");
        groupEl.className = "parent-task-group";

        const header = document.createElement("div");
        header.className = "parent-group-header";

        const link = document.createElement("a");
        link.className = "parent-group-link";
        link.href = group.parentUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";

        link.textContent =
          "#" +
          group.parentId +
          " - " +
          (group.parentTitle || "(senza titolo)");

        header.appendChild(link);
        groupEl.appendChild(header);

        for (const task of group.tasks) {
          const taskRow = document.createElement("div");
          taskRow.className = "task-row";

          const meta = document.createElement("div");
          meta.className = "task-meta";

          meta.textContent =
            "Task #" +
            task.taskId +
            " · " +
            (task.taskDate || "data sconosciuta");

          const content = document.createElement("div");
          content.className = "task-content";

          content.textContent =
            task.content || "(senza contenuto)";

          taskRow.appendChild(meta);
          taskRow.appendChild(content);
          groupEl.appendChild(taskRow);
        }

        container.appendChild(groupEl);

        if (parentsWithNewTasks.has(parentKey)) {
          pulseElement(groupEl);
        }
      }

      previous.taskIdsByParent[category] =
        nextTaskIdsByParent;
    }

    async function fetchDashboardFallback() {
      const response = await fetch(
        "/api/dashboard?ts=" + Date.now(),
        {
          method: "GET",
          cache: "no-store"
        }
      );

      if (!response.ok) {
        const details = await readErrorDetails(response);

        throw {
          message:
            "HTTP " +
            response.status +
            " " +
            response.statusText,
          details: details
        };
      }

      return await response.json();
    }

    async function fetchDashboardStream() {
      const response = await fetch(
        "/api/dashboard/stream?ts=" + Date.now(),
        {
          method: "GET",
          cache: "no-store"
        }
      );

      if (!response.ok) {
        const details = await readErrorDetails(response);

        throw {
          message:
            "HTTP " +
            response.status +
            " " +
            response.statusText,
          details: details
        };
      }

      if (!response.body || !response.body.getReader) {
        return await fetchDashboardFallback();
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");

      let buffer = "";
      let finalResult = null;

      function processLine(line) {
        const trimmed = line.trim();

        if (!trimmed) {
          return;
        }

        const event = JSON.parse(trimmed);

        if (event.type === "start") {
          setActivityTotals(event.totals);
          applyStats(event.stats);

          showProgress(
            "chiamate",
            0,
            event.totals?.chiamate || 0
          );

          showProgress(
            "problemi",
            0,
            event.totals?.problemi || 0
          );

          return;
        }

        if (event.type === "progress") {
          showProgress(
            event.category,
            event.completed || 0,
            event.total || 0
          );

          return;
        }

        if (event.type === "result") {
          finalResult = event.data;
          return;
        }

        if (event.type === "error") {
          throw new Error(
            event.message ||
            "Errore durante il caricamento attività"
          );
        }
      }

      while (true) {
        const chunk = await reader.read();

        if (chunk.done) {
          break;
        }

        buffer += decoder.decode(
          chunk.value,
          { stream: true }
        );

        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          processLine(line);
        }
      }

      buffer += decoder.decode();

      if (buffer.trim()) {
        processLine(buffer);
      }

      if (!finalResult) {
        throw new Error(
          "La risposta non contiene il risultato finale"
        );
      }

      return finalResult;
    }

    async function aggiornaDashboard(source) {
      if (isRefreshing) {
        return;
      }

      isRefreshing = true;
      setRefreshButtonLoading(true);

      try {
        setStatus("Aggiornamento in corso...", "info");

        const dashboardData =
          await fetchDashboardStream();

        applyStats(dashboardData.stats);
        setActivityTotals(dashboardData.totals);

        renderActivityTasks(
          "chiamate",
          dashboardData.chiamate
        );

        renderActivityTasks(
          "problemi",
          dashboardData.problemi
        );

        setStatus(
          "Aggiornato alle " +
          (
            dashboardData.aggiornatoAlle ||
            nowText()
          ),
          "ok"
        );
      }
      catch (error) {
        const message =
          error && error.message
            ? error.message
            : String(error);

        console.error(
          "Errore aggiornamento dashboard",
          error
        );

        setStatus(
          "Errore aggiornamento: " + message,
          "error"
        );
      }
      finally {
        hideAllProgress();
        isRefreshing = false;
        setRefreshButtonLoading(false);
        scheduleNextRefresh();
      }
    }

    window.addEventListener(
      "error",
      function (event) {
        console.error(
          "Errore JavaScript:",
          event.message,
          event
        );
      }
    );

    window.addEventListener(
      "unhandledrejection",
      function (event) {
        console.error(
          "Promise non gestita:",
          event.reason
        );
      }
    );

    document
      .getElementById("force-refresh")
      .addEventListener(
        "click",
        forceRefresh
      );

    window.setInterval(
      updateCountdown,
      500
    );

    aggiornaDashboard("iniziale");
  </script>
