<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard GLPI</title>

  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f6f8;
    }

    .dashboard {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px 18px;
    }

    .wrap {
      width: min(1120px, 100%);
      min-height: calc(100vh - 50px);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }

    .topbar {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .status-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      font-size: 13px;
      color: #6b7280;
      text-align: right;
      min-height: 36px;
    }

    .status-ok {
      color: #047857;
    }

    .status-error {
      color: #b91c1c;
      font-weight: 700;
    }

    .refresh-button {
      width: 38px;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .refresh-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
      background: #111827;
      color: #ffffff;
    }

    .refresh-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .refresh-button.loading svg {
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      width: 100%;
      min-height: 120px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .card.pulse {
      animation: cardInvertPulse 2.4s ease-in-out;
    }

    .card.pulse .title,
    .card.pulse .number {
      animation: cardTextPulse 2.4s ease-in-out;
    }

    @keyframes cardInvertPulse {
      0%, 24%, 50%, 100% {
        background: #ffffff;
        border-color: #e5e7eb;
        transform: translateY(0) scale(1);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      12%, 38%, 64% {
        background: #111827;
        border-color: #111827;
        transform: translateY(-4px) scale(1.015);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      }
    }

    @keyframes cardTextPulse {
      0%, 24%, 50%, 100% { color: inherit; }
      12%, 38%, 64% { color: #ffffff; }
    }

    .title {
      font-size: 13px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      text-align: center;
      margin-bottom: 12px;
    }

    .number {
      font-size: 46px;
      line-height: 1;
      font-weight: 800;
      color: #111827;
    }

    .activities {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 10px;
    }

    .activity-card {
      min-height: 100%;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .activity-title {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .activity-list {
      flex: 1;
      min-height: 280px;
      overflow: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      color: #6b7280;
      font-size: 13px;
      padding: 6px 0;
    }

    .ticket-task-group {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .ticket-task-group.pulse {
      animation: ticketGroupInvertPulse 2.4s ease-in-out;
    }

    .ticket-task-group.pulse .ticket-group-header,
    .ticket-task-group.pulse .ticket-group-link,
    .ticket-task-group.pulse .task-row,
    .ticket-task-group.pulse .task-meta,
    .ticket-task-group.pulse .task-content {
      animation: ticketGroupTextPulse 2.4s ease-in-out;
    }

    .ticket-task-group.pulse .task-row {
      animation-name: ticketGroupTextPulse, ticketRowBorderPulse;
      animation-duration: 2.4s, 2.4s;
      animation-timing-function: ease-in-out, ease-in-out;
    }

    @keyframes ticketGroupInvertPulse {
      0%, 24%, 50%, 100% {
        background: #ffffff;
        border-color: #e5e7eb;
        transform: translateY(0) scale(1);
        box-shadow: none;
      }

      12%, 38%, 64% {
        background: #111827;
        border-color: #111827;
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      }
    }

    @keyframes ticketGroupTextPulse {
      0%, 24%, 50%, 100% { color: inherit; }
      12%, 38%, 64% { color: #ffffff; }
    }

    @keyframes ticketRowBorderPulse {
      0%, 24%, 50%, 100% { border-top-color: #e5e7eb; }
      12%, 38%, 64% { border-top-color: #4b5563; }
    }

    .ticket-group-header {
      padding: 10px 11px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .ticket-task-group.pulse .ticket-group-header {
      animation-name: ticketGroupTextPulse, ticketRowBorderPulse;
      animation-duration: 2.4s, 2.4s;
      animation-timing-function: ease-in-out, ease-in-out;
    }

    .ticket-group-link {
      display: inline-block;
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      text-decoration: none;
    }

    .ticket-group-link:hover {
      text-decoration: underline;
    }

    .task-row {
      padding: 10px 11px;
      border-top: 1px solid #e5e7eb;
    }

    .task-row:first-of-type {
      border-top: none;
    }

    .task-meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .task-content {
      font-size: 13px;
      line-height: 1.4;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 940px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .activities {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 500px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main class="dashboard">
    <div class="wrap">
      <div class="topbar">
        <div class="status-area">
          <div id="status">Avvio dashboard...</div>
          <div id="countdown">Prossimo aggiornamento tra 60 secondi</div>
        </div>

        <button class="refresh-button" id="force-refresh" type="button" aria-label="Aggiorna ora" title="Aggiorna ora">
          <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"/>
          </svg>
        </button>
      </div>

      <section class="cards" aria-label="Stato ticket">
        <article class="card" id="card-totali-aperti">
          <div class="title">Totali aperti</div>
          <div class="number" id="totali-aperti">0</div>
        </article>

        <article class="card" id="card-nuovi-incidenti">
          <div class="title">Nuovi incidenti</div>
          <div class="number" id="nuovi-incidenti">0</div>
        </article>

        <article class="card" id="card-nuove-richieste">
          <div class="title">Nuove richieste</div>
          <div class="number" id="nuove-richieste">0</div>
        </article>

        <article class="card" id="card-assegnati-a-me">
          <div class="title">Assegnati a me</div>
          <div class="number" id="assegnati-a-me">0</div>
        </article>
      </section>

      <section class="activities" aria-label="Attività">
        <article class="activity-card" id="activity-card-chiamate">
          <div class="activity-title">Attività chiamate</div>
          <div class="activity-list" id="tasks-chiamate">
            <div class="empty">Caricamento attività...</div>
          </div>
        </article>

        <article class="activity-card" id="activity-card-problemi">
          <div class="activity-title">Attività problemi</div>
          <div class="activity-list" id="tasks-problemi">
            <div class="empty">Nessuna attività trovata</div>
          </div>
        </article>

        <article class="activity-card" id="activity-card-cambiamenti">
          <div class="activity-title">Attività cambiamenti</div>
          <div class="activity-list" id="tasks-cambiamenti">
            <div class="empty">Nessuna attività trovata</div>
          </div>
        </article>
      </section>
    </div>
  </main>

  <script>
    const REFRESH_SECONDS = 60;
    const REFRESH_MS = REFRESH_SECONDS * 1000;

    let nextRefreshAt = Date.now() + REFRESH_MS;
    let refreshTimer = null;
    let isRefreshing = false;

    const previous = {
      totaleAperti: null,
      nuoviIncidenti: null,
      nuoveRichieste: null,
      assegnatiAMe: null,
      chiamateTaskIdsByTicket: null
    };

    function nowText() {
      return new Date().toLocaleTimeString("it-IT", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function setStatus(message, type) {
      const statusEl = document.getElementById("status");
      statusEl.textContent = message;
      statusEl.className = "";

      if (type === "ok") statusEl.classList.add("status-ok");
      if (type === "error") statusEl.classList.add("status-error");
    }

    function setRefreshButtonLoading(isLoading) {
      const button = document.getElementById("force-refresh");
      button.disabled = isLoading;
      button.classList.toggle("loading", isLoading);
    }

    function pulseElement(el) {
      el.classList.remove("pulse");
      void el.offsetWidth;
      el.classList.add("pulse");
    }

    function setCard(numberId, cardId, key, value) {
      const numberEl = document.getElementById(numberId);
      const cardEl = document.getElementById(cardId);
      const nextValue = Number.isFinite(Number(value)) ? Number(value) : 0;

      if (previous[key] !== null && previous[key] !== nextValue) {
        pulseElement(cardEl);
      }

      previous[key] = nextValue;
      numberEl.textContent = String(nextValue);
    }

    function updateCountdown() {
      const countdownEl = document.getElementById("countdown");
      const remainingMs = Math.max(0, nextRefreshAt - Date.now());
      const remainingSeconds = Math.ceil(remainingMs / 1000);
      countdownEl.textContent = "Prossimo aggiornamento tra " + remainingSeconds + " secondi";
    }

    function scheduleNextRefresh() {
      nextRefreshAt = Date.now() + REFRESH_MS;

      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
      }

      refreshTimer = window.setTimeout(function () {
        aggiornaDashboard("timer");
      }, REFRESH_MS);

      updateCountdown();
    }

    function forceRefresh() {
      if (isRefreshing) return;

      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
        refreshTimer = null;
      }

      aggiornaDashboard("manuale");
    }

    async function readErrorDetails(response) {
      const contentType = response.headers.get("content-type") || "";

      try {
        if (contentType.includes("application/json")) {
          return await response.json();
        }

        return await response.text();
      } catch (error) {
        return "Impossibile leggere il dettaglio errore: " + error.message;
      }
    }

    function groupTasksByTicket(tasks) {
      const groups = new Map();

      if (!Array.isArray(tasks)) {
        return groups;
      }

      for (const task of tasks) {
        const ticketKey = String(task.ticketId);

        if (!groups.has(ticketKey)) {
          groups.set(ticketKey, {
            ticketId: task.ticketId,
            ticketTitle: task.ticketTitle,
            ticketUrl: task.ticketUrl,
            tasks: []
          });
        }

        groups.get(ticketKey).tasks.push(task);
      }

      return groups;
    }

    function getTaskIdsByTicket(groups) {
      const taskIdsByTicket = new Map();

      for (const [ticketKey, group] of groups.entries()) {
        taskIdsByTicket.set(
          ticketKey,
          new Set(
            group.tasks.map(function (task) {
              return String(task.taskId);
            })
          )
        );
      }

      return taskIdsByTicket;
    }

    function getTicketsWithNewTasks(nextTaskIdsByTicket) {
      const ticketsWithNewTasks = new Set();

      if (previous.chiamateTaskIdsByTicket === null) {
        return ticketsWithNewTasks;
      }

      for (const [ticketKey, nextTaskIds] of nextTaskIdsByTicket.entries()) {
        const previousTaskIds = previous.chiamateTaskIdsByTicket.get(ticketKey) || new Set();

        for (const taskId of nextTaskIds.values()) {
          if (!previousTaskIds.has(taskId)) {
            ticketsWithNewTasks.add(ticketKey);
            break;
          }
        }
      }

      return ticketsWithNewTasks;
    }

    function renderChiamateTasks(tasks) {
      const container = document.getElementById("tasks-chiamate");
      const groups = groupTasksByTicket(tasks);
      const nextTaskIdsByTicket = getTaskIdsByTicket(groups);
      const ticketsWithNewTasks = getTicketsWithNewTasks(nextTaskIdsByTicket);

      container.innerHTML = "";

      if (groups.size === 0) {
        container.innerHTML = '<div class="empty">Nessuna attività trovata</div>';
        previous.chiamateTaskIdsByTicket = nextTaskIdsByTicket;
        return;
      }

      for (const [ticketKey, group] of groups.entries()) {
        const groupEl = document.createElement("div");
        groupEl.className = "ticket-task-group";

        const header = document.createElement("div");
        header.className = "ticket-group-header";

        const link = document.createElement("a");
        link.className = "ticket-group-link";
        link.href = group.ticketUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = "#" + group.ticketId + " - " + group.ticketTitle;

        header.appendChild(link);
        groupEl.appendChild(header);

        for (const task of group.tasks) {
          const taskRow = document.createElement("div");
          taskRow.className = "task-row";

          const meta = document.createElement("div");
          meta.className = "task-meta";
          meta.textContent = "Task #" + task.taskId + " · " + (task.taskDate || "data sconosciuta");

          const content = document.createElement("div");
          content.className = "task-content";
          content.textContent = task.content || "(senza contenuto)";

          taskRow.appendChild(meta);
          taskRow.appendChild(content);
          groupEl.appendChild(taskRow);
        }

        container.appendChild(groupEl);

        if (ticketsWithNewTasks.has(ticketKey)) {
          pulseElement(groupEl);
        }
      }

      previous.chiamateTaskIdsByTicket = nextTaskIdsByTicket;
    }

    async function aggiornaDashboard(source) {
      if (isRefreshing) return;

      isRefreshing = true;
      setRefreshButtonLoading(true);

      try {
        setStatus("Aggiornamento in corso...", "info");

        const statsResponse = await fetch("/api/stats?ts=" + Date.now(), {
          method: "GET",
          cache: "no-store"
        });

        if (!statsResponse.ok) {
          const details = await readErrorDetails(statsResponse);
          throw {
            message: "HTTP " + statsResponse.status + " " + statsResponse.statusText,
            details: details
          };
        }

        const stats = await statsResponse.json();

        setCard("totali-aperti", "card-totali-aperti", "totaleAperti", stats.totaleTicketAperti);
        setCard("nuovi-incidenti", "card-nuovi-incidenti", "nuoviIncidenti", stats.nuoviIncidenti);
        setCard("nuove-richieste", "card-nuove-richieste", "nuoveRichieste", stats.nuoveRichieste);
        setCard("assegnati-a-me", "card-assegnati-a-me", "assegnatiAMe", stats.assegnatiAMe);

        const tasksResponse = await fetch("/api/tasks?ts=" + Date.now(), {
          method: "GET",
          cache: "no-store"
        });

        if (!tasksResponse.ok) {
          const details = await readErrorDetails(tasksResponse);
          throw {
            message: "HTTP " + tasksResponse.status + " " + tasksResponse.statusText,
            details: details
          };
        }

        const tasks = await tasksResponse.json();

        renderChiamateTasks(tasks.chiamate);

        setStatus("Aggiornato alle " + (stats.aggiornatoAlle || nowText()), "ok");
      }
      catch (error) {
        const message = error && error.message ? error.message : String(error);
        console.error("Errore aggiornamento dashboard", error);
        setStatus("Errore aggiornamento: " + message, "error");
      }
      finally {
        isRefreshing = false;
        setRefreshButtonLoading(false);
        scheduleNextRefresh();
      }
    }

    window.addEventListener("error", function (event) {
      console.error("Errore JavaScript:", event.message, event);
    });

    window.addEventListener("unhandledrejection", function (event) {
      console.error("Promise non gestita:", event.reason);
    });

    document.getElementById("force-refresh").addEventListener("click", forceRefresh);

    window.setInterval(updateCountdown, 500);

    aggiornaDashboard("iniziale");
  </script>
</body>
</html>
