<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elenco GLPI</title>

  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f6f8;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px 24px;
    }

    .wrap {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .title-area {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .back-link {
      width: fit-content;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .back-link:hover { color: #111827; text-decoration: underline; }

    .page-title {
      margin: 0;
      color: #111827;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .refresh-area {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .status-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-height: 36px;
      color: #6b7280;
      font-size: 13px;
      text-align: right;
    }

    .status-ok { color: #047857; }
    .status-error { color: #b91c1c; font-weight: 700; }

    .refresh-button {
      flex: 0 0 38px;
      width: 38px;
      min-width: 38px;
      max-width: 38px;
      height: 38px;
      min-height: 38px;
      max-height: 38px;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 0;
      appearance: none;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .refresh-button svg {
      display: block;
      flex: 0 0 19px;
      width: 19px;
      height: 19px;
      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .refresh-button:hover {
      transform: translateY(-1px);
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    .refresh-button:disabled,
    .refresh-button:disabled:hover {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      background: #ffffff;
      color: #111827;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }

    .refresh-button.loading svg {
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .list-card {
      width: 100%;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
    }

    .list-card-header {
      min-height: 44px;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .list-label {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .count-badge {
      min-width: 30px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .table-wrap { width: 100%; overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #eef0f3;
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }

    th {
      background: #ffffff;
      color: #6b7280;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr:last-child td { border-bottom: 0; }
    tbody tr[data-url] { cursor: pointer; }
    tbody tr:hover { background: #fafafa; }
    tbody tr:focus-visible {
      outline: 3px solid rgba(17, 24, 39, 0.18);
      outline-offset: -3px;
      background: #fafafa;
    }

    .id-cell {
      width: 88px;
      color: #6b7280;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .title-link {
      color: #111827;
      font-weight: 800;
      text-decoration: none;
    }

    .title-link:hover { text-decoration: underline; }

    .title-cell-content {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .title-cell-content .title-link {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .activity-badge {
      flex: 0 0 auto;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #eef0f3;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .secondary { color: #6b7280; }

    .empty,
    .loading {
      padding: 30px 18px;
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 650px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .refresh-area { width: 100%; justify-content: space-between; }
      .status-area { align-items: flex-start; text-align: left; }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="wrap">
      <header class="topbar">
        <div class="title-area">
          <a class="back-link" href="/">← Personal GLPI Dashboard</a>
          <h1 class="page-title" id="page-title">Elenco GLPI</h1>
        </div>

        <div class="refresh-area">
          <div class="status-area">
            <div id="status">Caricamento...</div>
            <div id="countdown">Preparazione aggiornamento...</div>
          </div>

          <button class="refresh-button" id="force-refresh" type="button" aria-label="Aggiorna ora" title="Aggiorna ora">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="list-card">
        <div class="list-card-header">
          <span class="list-label" id="list-label">Elementi</span>
          <span class="count-badge" id="item-count">0</span>
        </div>

        <div class="table-wrap" id="table-container">
          <div class="loading">Caricamento elenco...</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const configuredRefreshSeconds = Number("__AUTO_REFRESH_SECONDS__");
    const REFRESH_SECONDS = Number.isFinite(configuredRefreshSeconds) && configuredRefreshSeconds >= 10
      ? configuredRefreshSeconds
      : 60;
    const REFRESH_MS = REFRESH_SECONDS * 1000;
    const CACHE_KEY = "personal-glpi-dashboard-cache-v3";
    const CACHE_VERSION = 3;

    const VIEW_CONFIG = {
      "totali-aperti": { title: "Totali aperti", label: "Ticket aperti" },
      "nuovi-incidenti": { title: "Nuovi incidenti", label: "Ticket filtrati" },
      "nuove-richieste": { title: "Nuove richieste", label: "Ticket filtrati" },
      "assegnati-a-me": { title: "Assegnati a me", label: "Ticket assegnati" },
      "chiamate": { title: "Chiamate", label: "Ticket aperti" },
      "problemi": { title: "Problemi", label: "Problemi aperti" },
      "cambiamenti": { title: "Cambiamenti", label: "Cambiamenti aperti" }
    };

    const view = window.location.pathname.split("/").filter(Boolean).pop() || "totali-aperti";
    const config = VIEW_CONFIG[view] || VIEW_CONFIG["totali-aperti"];

    let nextRefreshAt = Date.now() + REFRESH_MS;
    let refreshTimer = null;
    let isRefreshing = false;

    document.title = config.title + " · Personal GLPI Dashboard";
    document.getElementById("page-title").textContent = config.title;
    document.getElementById("list-label").textContent = config.label;

    function createEmptyCache() {
      return {
        version: CACHE_VERSION,
        stats: null,
        totals: {
          chiamate: 0,
          problemi: 0,
          cambiamenti: 0
        },
        tasks: {
          chiamate: [],
          problemi: [],
          cambiamenti: []
        },
        lists: {},
        listUpdatedAt: {},
        categoryUpdatedAt: {},
        aggiornatoAlle: null,
        lastFullRefreshAt: 0
      };
    }

    function readCache() {
      try {
        const raw = window.sessionStorage.getItem(CACHE_KEY);
        if (!raw) return null;

        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== CACHE_VERSION) return null;

        return parsed;
      } catch (error) {
        console.warn("Impossibile leggere la cache dashboard", error);
        return null;
      }
    }

    let dashboardCache = readCache() || createEmptyCache();

    function saveCache() {
      try {
        window.sessionStorage.setItem(
          CACHE_KEY,
          JSON.stringify(dashboardCache)
        );
      } catch (error) {
        console.warn("Impossibile salvare la cache dashboard", error);
      }
    }

    function nowText() {
      return new Date().toLocaleTimeString("it-IT", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function setStatus(message, type) {
      const element = document.getElementById("status");
      element.textContent = message;
      element.className = "";
      if (type === "ok") element.classList.add("status-ok");
      if (type === "error") element.classList.add("status-error");
    }

    function setButtonLoading(isLoading) {
      const button = document.getElementById("force-refresh");
      button.disabled = isLoading;
      button.classList.toggle("loading", isLoading);
    }

    function updateCountdown() {
      const remainingSeconds = Math.ceil(
        Math.max(0, nextRefreshAt - Date.now()) / 1000
      );

      document.getElementById("countdown").textContent =
        "Prossimo aggiornamento tra " + remainingSeconds + " secondi";
    }

    function scheduleNextRefresh(delayMs = REFRESH_MS) {
      const safeDelay = Math.max(0, Number(delayMs) || 0);
      nextRefreshAt = Date.now() + safeDelay;

      if (refreshTimer) window.clearTimeout(refreshTimer);
      refreshTimer = window.setTimeout(() => refreshList("timer"), safeDelay);
      updateCountdown();
    }

    function forceRefresh() {
      if (isRefreshing) return;

      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
        refreshTimer = null;
      }

      refreshList("manuale");
    }

    function mergeTotalsPatch(patch) {
      if (!patch || typeof patch !== "object") return;

      dashboardCache.totals = dashboardCache.totals || {};

      for (const category of ["chiamate", "problemi", "cambiamenti"]) {
        if (Object.prototype.hasOwnProperty.call(patch, category)) {
          dashboardCache.totals[category] = Number(patch[category]) || 0;
        }
      }
    }

    function mergeRelatedViews(relatedViews, timestamp = Date.now()) {
      if (!relatedViews || typeof relatedViews !== "object") return;

      dashboardCache.lists = dashboardCache.lists || {};
      dashboardCache.listUpdatedAt = dashboardCache.listUpdatedAt || {};

      for (const [relatedView, items] of Object.entries(relatedViews)) {
        dashboardCache.lists[relatedView] = Array.isArray(items) ? items : [];
        dashboardCache.listUpdatedAt[relatedView] = timestamp;
      }
    }

    function getCategoryForView(currentView) {
      if (["totali-aperti", "nuovi-incidenti", "nuove-richieste", "assegnati-a-me", "chiamate"].includes(currentView)) {
        return "chiamate";
      }

      if (currentView === "problemi") return "problemi";
      if (currentView === "cambiamenti") return "cambiamenti";
      return null;
    }

    function getActivityCountsByParent(category) {
      const counts = new Map();
      const tasks = dashboardCache.tasks && Array.isArray(dashboardCache.tasks[category])
        ? dashboardCache.tasks[category]
        : [];

      for (const task of tasks) {
        const key = String(task.parentId);
        counts.set(key, (counts.get(key) || 0) + 1);
      }

      return counts;
    }

    function renderRows(items) {
      const safeItems = Array.isArray(items) ? items : [];
      const container = document.getElementById("table-container");
      const category = getCategoryForView(view);
      const activityCounts = getActivityCountsByParent(category);

      document.getElementById("item-count").textContent = String(safeItems.length);

      if (!safeItems.length) {
        container.innerHTML = '<div class="empty">Nessun elemento trovato</div>';
        return;
      }

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const tbody = document.createElement("tbody");

      const headerRow = document.createElement("tr");
      ["ID", "Titolo", "Stato", "Tipo", "Aggiornato"].forEach(label => {
        const th = document.createElement("th");
        th.textContent = label;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);

      for (const item of safeItems) {
        const row = document.createElement("tr");
        row.dataset.url = item.url || "";
        row.tabIndex = 0;
        row.setAttribute("role", "link");
        row.setAttribute("aria-label", "Apri " + (item.title || "elemento GLPI"));

        const openItem = () => {
          if (!item.url) return;
          window.open(item.url, "_blank", "noopener,noreferrer");
        };

        row.addEventListener("click", event => {
          if (event.target.closest("a")) return;
          openItem();
        });

        row.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openItem();
          }
        });

        const idCell = document.createElement("td");
        idCell.className = "id-cell";
        idCell.textContent = "#" + item.id;

        const titleCell = document.createElement("td");
        const titleContent = document.createElement("div");
        titleContent.className = "title-cell-content";

        const link = document.createElement("a");
        link.className = "title-link";
        link.href = item.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = item.title || "(senza titolo)";
        titleContent.appendChild(link);

        const activityCount = activityCounts.get(String(item.id)) || 0;

        if (activityCount > 0) {
          const badge = document.createElement("span");
          badge.className = "activity-badge";
          badge.textContent = String(activityCount);
          badge.title = activityCount === 1
            ? "1 attività assegnata"
            : activityCount + " attività assegnate";
          badge.setAttribute("aria-label", badge.title);
          titleContent.appendChild(badge);
        }

        titleCell.appendChild(titleContent);

        const statusCell = document.createElement("td");
        statusCell.className = "secondary";
        statusCell.textContent = item.status || "-";

        const typeCell = document.createElement("td");
        typeCell.className = "secondary";
        typeCell.textContent = item.type || "-";

        const dateCell = document.createElement("td");
        dateCell.className = "secondary";
        dateCell.textContent = item.updatedAt || "-";

        row.appendChild(idCell);
        row.appendChild(titleCell);
        row.appendChild(statusCell);
        row.appendChild(typeCell);
        row.appendChild(dateCell);
        tbody.appendChild(row);
      }

      table.appendChild(thead);
      table.appendChild(tbody);
      container.innerHTML = "";
      container.appendChild(table);
    }

    async function readErrorDetails(response) {
      try {
        const contentType = response.headers.get("content-type") || "";
        return contentType.includes("application/json")
          ? await response.json()
          : await response.text();
      } catch (error) {
        return "Impossibile leggere il dettaglio errore: " + error.message;
      }
    }

    function updateCacheFromResponse(data) {
      const timestamp = Date.now();

      mergeRelatedViews(data.relatedViews, timestamp);
      mergeTotalsPatch(data.totalsPatch);

      if (data.tasksPatch && typeof data.tasksPatch === "object") {
        dashboardCache.tasks = dashboardCache.tasks || {};
        dashboardCache.categoryUpdatedAt = dashboardCache.categoryUpdatedAt || {};

        for (const category of ["chiamate", "problemi", "cambiamenti"]) {
          if (Object.prototype.hasOwnProperty.call(data.tasksPatch, category)) {
            dashboardCache.tasks[category] = Array.isArray(data.tasksPatch[category])
              ? data.tasksPatch[category]
              : [];
            dashboardCache.categoryUpdatedAt[category] = timestamp;
          }
        }
      }

      if (data.stats) {
        dashboardCache.stats = data.stats;
      }

      saveCache();
    }

    async function refreshList(source) {
      if (isRefreshing) return;

      isRefreshing = true;
      setButtonLoading(true);
      setStatus("Aggiornamento in corso...", "info");

      try {
        const response = await fetch(
          "/api/list?view=" + encodeURIComponent(view) + "&ts=" + Date.now(),
          {
            method: "GET",
            cache: "no-store"
          }
        );

        if (!response.ok) {
          const details = await readErrorDetails(response);
          throw {
            message: "HTTP " + response.status + " " + response.statusText,
            details
          };
        }

        const data = await response.json();
        updateCacheFromResponse(data);
        renderRows(Array.isArray(data.items) ? data.items : []);

        setStatus(
          "Aggiornato alle " + (data.aggiornatoAlle || nowText()),
          "ok"
        );
      } catch (error) {
        console.error("Errore elenco", error);
        setStatus(
          "Errore aggiornamento: " + (error.message || String(error)),
          "error"
        );
      } finally {
        isRefreshing = false;
        setButtonLoading(false);
        scheduleNextRefresh();
      }
    }

    function getNavigationType() {
      const entries = performance.getEntriesByType
        ? performance.getEntriesByType("navigation")
        : [];

      return entries.length ? entries[0].type : "navigate";
    }

    function initializeList() {
      const navigationType = getNavigationType();
      const cachedItems = dashboardCache.lists && dashboardCache.lists[view];
      const cacheAvailable = Array.isArray(cachedItems);

      if (cacheAvailable) {
        renderRows(cachedItems);

        const cachedTimestamp = Number(
          dashboardCache.listUpdatedAt && dashboardCache.listUpdatedAt[view]
        );

        const cachedTime = Number.isFinite(cachedTimestamp) && cachedTimestamp > 0
          ? new Date(cachedTimestamp).toLocaleTimeString("it-IT", {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit"
            })
          : nowText();

        setStatus("Dati disponibili alle " + cachedTime, "ok");
      }

      // Normal navigation from the dashboard reuses the already loaded data.
      // A real browser reload intentionally refreshes only this resource type.
      if (navigationType !== "reload" && cacheAvailable) {
        scheduleNextRefresh();
        return;
      }

      refreshList("iniziale");
    }

    document.getElementById("force-refresh").addEventListener("click", forceRefresh);
    window.setInterval(updateCountdown, 500);

    window.addEventListener("pageshow", function (event) {
      if (!event.persisted) return;

      const latestCache = readCache();
      if (!latestCache) return;

      dashboardCache = latestCache;
      const cachedItems = dashboardCache.lists && dashboardCache.lists[view];
      if (Array.isArray(cachedItems)) renderRows(cachedItems);
    });

    initializeList();
  </script>
</body>
</html>
