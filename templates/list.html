<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elenco GLPI</title>

  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f6f8;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px 24px;
    }

    .wrap {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .title-area {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .back-link {
      width: fit-content;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .back-link:hover { color: #111827; text-decoration: underline; }

    .page-title {
      margin: 0;
      color: #111827;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .refresh-area {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .status-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-height: 36px;
      color: #6b7280;
      font-size: 13px;
      text-align: right;
    }

    .status-ok { color: #047857; }
    .status-error { color: #b91c1c; font-weight: 700; }

    .refresh-button {
      box-sizing: border-box;
      flex: 0 0 38px;
      width: 38px;
      min-width: 38px;
      max-width: 38px;
      height: 38px;
      min-height: 38px;
      max-height: 38px;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 0;
      appearance: none;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .refresh-button svg {
      display: block;
      position: static;
      flex: 0 0 19px;
      width: 19px;
      height: 19px;
      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .refresh-button:hover {
      transform: translateY(-1px);
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    .refresh-button:disabled,
    .refresh-button:disabled:hover {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      background: #ffffff;
      color: #111827;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }

    .refresh-button.loading svg {
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .list-card {
      width: 100%;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
    }

    .list-card-header {
      min-height: 44px;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .list-label {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .count-badge {
      min-width: 30px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .filter-bar {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
      display: grid;
      grid-template-columns: minmax(220px, 1.7fr) minmax(160px, 1fr) minmax(160px, 1fr) 36px;
      gap: 10px;
      align-items: end;
    }

    .filter-field {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .filter-label {
      color: #6b7280;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .filter-control {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      background: #ffffff;
      color: #111827;
      font: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .filter-control:focus {
      border-color: #6b7280;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
    }

    .reset-filter-button {
      width: 36px;
      min-width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      background: #ffffff;
      color: #6b7280;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
    }

    .reset-filter-button:hover,
    .reset-filter-button:focus-visible {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
      outline: none;
    }

    .reset-filter-button svg {
      display: block;
      width: 17px;
      height: 17px;
      pointer-events: none;
    }

    .table-wrap { width: 100%; overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #eef0f3;
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }

    th {
      background: #ffffff;
      color: #6b7280;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .sortable-header {
      padding: 0;
    }

    .sort-button {
      width: 100%;
      min-height: 42px;
      padding: 10px 16px;
      border: 0;
      background: transparent;
      color: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 5px;
      font: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      cursor: pointer;
      text-align: left;
    }

    .sort-button:hover,
    .sort-button:focus-visible {
      color: #111827;
      outline: none;
    }

    .sort-icon {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(1px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .sort-icon svg {
      display: block;
      width: 14px;
      height: 14px;
    }

    .sortable-header:hover .sort-icon,
    .sort-button:focus-visible .sort-icon,
    .sort-button.is-active .sort-icon {
      opacity: 1;
    }

    .sort-button[data-direction="desc"] .sort-icon {
      transform: rotate(180deg) translateY(-1px);
    }

    tbody tr:last-child td { border-bottom: 0; }
    tbody tr[data-url] { cursor: pointer; }
    tbody tr:hover { background: #fafafa; }
    tbody tr:focus-visible {
      outline: 3px solid rgba(17, 24, 39, 0.18);
      outline-offset: -3px;
      background: #fafafa;
    }

    .id-cell {
      width: 88px;
      color: #6b7280;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .title-link {
      color: #111827;
      font-weight: 800;
      text-decoration: none;
    }

    .title-link:hover { text-decoration: underline; }

    .title-cell-content {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .title-cell-content .title-link {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .state-icon {
      --state-color: #9ca3af;
      flex: 0 0 18px;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--state-color);
      line-height: 0;
    }

    .state-icon svg {
      display: block;
      width: 18px;
      height: 18px;
      overflow: visible;
    }

    .activity-badge {
      flex: 0 0 auto;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #eef0f3;
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .secondary { color: #6b7280; }

    .notes-header,
    .notes-cell {
      position: sticky;
      right: 0;
      width: 62px;
      min-width: 62px;
      max-width: 62px;
      padding: 8px 10px;
      text-align: center;
      background: #ffffff;
      box-shadow: -8px 0 12px -12px rgba(15, 23, 42, 0.45);
    }

    .notes-header {
      z-index: 4;
      color: #6b7280;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .notes-cell {
      z-index: 2;
    }

    tbody tr:hover .notes-cell,
    tbody tr:focus-visible .notes-cell {
      background: #fafafa;
    }

    .notes-button {
      position: relative;
      width: 34px;
      min-width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #4b5563;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease, transform 150ms ease;
    }

    .notes-button:hover,
    .notes-button:focus-visible {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
      outline: none;
      transform: translateY(-1px);
    }

    .notes-button svg {
      width: 17px;
      height: 17px;
      display: block;
      pointer-events: none;
    }

    .notes-count-badge {
      position: absolute;
      top: -7px;
      right: -7px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border: 2px solid #ffffff;
      border-radius: 999px;
      background: #dc2626;
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(15, 23, 42, 0.34);
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .notes-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 90;
      width: min(460px, 100vw);
      background: #f8fafc;
      border-left: 1px solid #dfe3e8;
      box-shadow: -18px 0 45px rgba(15, 23, 42, 0.18);
      transform: translateX(100%);
      transition: transform 220ms ease;
      display: flex;
      flex-direction: column;
    }

    body.drawer-open {
      overflow: hidden;
    }

    body.drawer-open .drawer-backdrop {
      opacity: 1;
      visibility: visible;
    }

    body.drawer-open .notes-drawer {
      transform: translateX(0);
    }

    .drawer-header {
      min-height: 62px;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .drawer-heading {
      min-width: 0;
    }

    .drawer-eyebrow {
      margin-bottom: 3px;
      color: #6b7280;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .drawer-title {
      margin: 0;
      overflow: hidden;
      color: #111827;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-close {
      flex: 0 0 36px;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #4b5563;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .drawer-close:hover,
    .drawer-close:focus-visible {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
      outline: none;
    }

    .drawer-close svg {
      width: 18px;
      height: 18px;
    }

    .drawer-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
    }

    .item-summary {
      margin-bottom: 14px;
      padding: 13px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 13px;
      background: #ffffff;
    }

    .item-summary-title {
      margin: 0 0 10px;
      color: #111827;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 800;
    }

    .item-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px 14px;
    }

    .item-summary-field {
      min-width: 0;
    }

    .item-summary-label {
      display: block;
      margin-bottom: 2px;
      color: #9ca3af;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .item-summary-value {
      display: block;
      overflow: hidden;
      color: #4b5563;
      font-size: 12px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-composer {
      margin-bottom: 14px;
      padding: 13px;
      border: 1px solid #e5e7eb;
      border-radius: 13px;
      background: #ffffff;
    }

    .note-composer textarea,
    .note-edit-textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 10px 11px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #111827;
      font: inherit;
      font-size: 13px;
      line-height: 1.45;
      outline: none;
    }

    .note-composer textarea:focus,
    .note-edit-textarea:focus {
      border-color: #6b7280;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
    }

    .composer-footer,
    .note-edit-actions {
      margin-top: 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .composer-hint {
      color: #9ca3af;
      font-size: 10px;
    }

    .primary-small-button,
    .secondary-small-button,
    .danger-small-button {
      min-height: 32px;
      padding: 0 11px;
      border-radius: 9px;
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-small-button {
      border: 1px solid #111827;
      background: #111827;
      color: #ffffff;
    }

    .primary-small-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .secondary-small-button {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #4b5563;
    }

    .danger-small-button {
      border: 1px solid #fecaca;
      background: #fff7f7;
      color: #b91c1c;
    }

    .notes-section-header {
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .notes-section-title {
      margin: 0;
      color: #6b7280;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .drawer-note-count {
      min-width: 24px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .note-card {
      padding: 11px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      transition: opacity 150ms ease, transform 150ms ease, border-color 150ms ease;
    }

    .note-card.is-completed {
      opacity: 0.64;
    }

    .note-card.is-dragging {
      opacity: 0.35;
    }

    .note-card.drag-over {
      border-color: #111827;
      transform: translateY(2px);
    }

    .note-card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .drag-handle {
      flex: 0 0 24px;
      width: 24px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #9ca3af;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .drag-handle svg {
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .note-content-wrap {
      flex: 1;
      min-width: 0;
    }

    .note-text {
      margin: 0;
      color: #374151;
      font-size: 13px;
      line-height: 1.48;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-card.is-completed .note-text {
      text-decoration: line-through;
    }

    .note-date {
      margin-top: 7px;
      color: #9ca3af;
      font-size: 10px;
    }

    .note-actions {
      margin-top: 9px;
      padding-top: 8px;
      border-top: 1px solid #f0f2f4;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .note-action-button {
      min-height: 29px;
      padding: 0 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      color: #6b7280;
      font: inherit;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .note-action-button:hover,
    .note-action-button:focus-visible {
      border-color: #9ca3af;
      color: #111827;
      outline: none;
    }

    .note-action-button.complete {
      color: #047857;
    }

    .note-action-button.delete {
      color: #b91c1c;
    }

    .drawer-empty,
    .drawer-loading,
    .drawer-error {
      padding: 22px 12px;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      color: #6b7280;
      background: #ffffff;
      font-size: 12px;
      text-align: center;
    }

    .drawer-error {
      border-color: #fecaca;
      color: #b91c1c;
      background: #fff7f7;
    }

    .empty,
    .table-loading {
      padding: 30px 18px;
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 780px) {
      .filter-bar {
        grid-template-columns: 1fr 1fr 36px;
      }

      .filter-field-title {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 650px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .refresh-area { width: 100%; justify-content: space-between; }
      .status-area { align-items: flex-start; text-align: left; }

      .filter-bar {
        grid-template-columns: 1fr 36px;
      }

      .filter-field-title,
      .filter-field-state,
      .filter-field-type {
        grid-column: 1;
      }

      .reset-filter-button {
        grid-column: 2;
        grid-row: 2;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="wrap">
      <header class="topbar">
        <div class="title-area">
          <a class="back-link" href="/">← Personal GLPI Dashboard</a>
          <h1 class="page-title" id="page-title">Elenco GLPI</h1>
        </div>

        <div class="refresh-area">
          <div class="status-area">
            <div id="status">Caricamento...</div>
            <div id="countdown">Preparazione aggiornamento...</div>
          </div>

          <button class="refresh-button" id="force-refresh" type="button" aria-label="Aggiorna ora" title="Aggiorna ora">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.1a1 1 0 1 0-1.86.74A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h6V4z"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="list-card">
        <div class="list-card-header">
          <span class="list-label" id="list-label">Elementi</span>

  <aside
    class="notes-drawer"
    id="notes-drawer"
    aria-hidden="true"
    aria-labelledby="drawer-title"
  >
    <header class="drawer-header">

    <div class="drawer-scroll">
      <section class="item-summary" aria-label="Informazioni elemento">

  <script>
    const configuredRefreshSeconds = Number("__AUTO_REFRESH_SECONDS__");
    const REFRESH_SECONDS = Number.isFinite(configuredRefreshSeconds) && configuredRefreshSeconds >= 10
      ? configuredRefreshSeconds
      : 60;
    const REFRESH_MS = REFRESH_SECONDS * 1000;
    const CACHE_KEY = "personal-glpi-dashboard-cache-v5";
    const CACHE_VERSION = 5;

    const VIEW_CONFIG = {
      "totali-aperti": { title: "Totali aperti", label: "Ticket aperti" },
      "nuovi-incidenti": { title: "Nuovi incidenti", label: "Ticket filtrati" },
      "nuove-richieste": { title: "Nuove richieste", label: "Ticket filtrati" },
      "assegnati-a-me": { title: "Assegnati a me", label: "Ticket assegnati" },
      "chiamate": { title: "Chiamate", label: "Ticket aperti" },
      "problemi": { title: "Problemi", label: "Problemi aperti" },
      "cambiamenti": { title: "Cambiamenti", label: "Cambiamenti aperti" }
    };

    const view = window.location.pathname.split("/").filter(Boolean).pop() || "totali-aperti";
    const config = VIEW_CONFIG[view] || VIEW_CONFIG["totali-aperti"];

    let nextRefreshAt = Date.now() + REFRESH_MS;
    let refreshTimer = null;
    let isRefreshing = false;
    let allItems = [];
    let noteCounts = new Map();
    let currentDrawerItem = null;
    let currentNotes = [];
    let editingNoteId = null;
    let draggedNoteId = null;

    const listState = {
      title: "",
      state: "",
      type: "",
      sortColumn: null,
      sortDirection: "asc"
    };

    document.title = config.title + " · Personal GLPI Dashboard";
    document.getElementById("page-title").textContent = config.title;
    document.getElementById("list-label").textContent = config.label;

    function createEmptyCache() {
      return {
        version: CACHE_VERSION,
        stats: null,
        totals: {
          chiamate: 0,
          problemi: 0,
          cambiamenti: 0
        },
        tasks: {
          chiamate: [],
          problemi: [],
          cambiamenti: []
        },
        lists: {},
        listUpdatedAt: {},
        categoryUpdatedAt: {},
        updates: {
          items: [],
          count: 0,
          generatedAt: null
        },
        aggiornatoAlle: null,
        lastFullRefreshAt: 0
      };
    }

    function readCache() {
      try {
        const raw = window.sessionStorage.getItem(CACHE_KEY);
        if (!raw) return null;

        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== CACHE_VERSION) return null;

        return parsed;
      } catch (error) {
        console.warn("Impossibile leggere la cache dashboard", error);
        return null;
      }
    }

    let dashboardCache = readCache() || createEmptyCache();

    function saveCache() {
      try {
        window.sessionStorage.setItem(
          CACHE_KEY,
          JSON.stringify(dashboardCache)
        );
      } catch (error) {
        console.warn("Impossibile salvare la cache dashboard", error);
      }
    }


    const STATUS_ICON_CONFIG = {
      ticket: {
        1:  { icon: "circle-filled", color: "#2fb344", label: "Nuova" },
        10: { icon: "help-circle", color: "#74a7f8", label: "Convalida" },
        2:  { icon: "circle", color: "#2fb344", label: "In lavorazione (assegnata)" },
        3:  { icon: "calendar", color: "#174ea6", label: "In lavorazione (pianificata)" },
        4:  { icon: "circle-filled", color: "#ff9800", label: "In sospeso" },
        5:  { icon: "circle", color: "#000000", label: "Risolto" },
        6:  { icon: "circle-filled", color: "#000000", label: "Chiusa" }
      },
      problem: {
        1: { icon: "circle-filled", color: "#2fb344", label: "Nuova" },
        7: { icon: "check-filled", color: "#008a1f", label: "Accettato" },
        2: { icon: "circle", color: "#2fb344", label: "In lavorazione (assegnata)" },
        3: { icon: "calendar", color: "#174ea6", label: "In lavorazione (pianificata)" },
        4: { icon: "circle-filled", color: "#ff9800", label: "In sospeso" },
        5: { icon: "circle", color: "#000000", label: "Risolto" },
        8: { icon: "eye", color: "#000000", label: "Sotto osservazione" },
        6: { icon: "circle-filled", color: "#000000", label: "Chiusa" }
      },
      change: {
        1:  { icon: "circle-filled", color: "#2fb344", label: "Nuova" },
        9:  { icon: "circle", color: "#8ecae6", label: "Valutazione" },
        10: { icon: "help-circle", color: "#74a7f8", label: "Convalida" },
        7:  { icon: "check-filled", color: "#008a1f", label: "Accettato" },
        4:  { icon: "circle-filled", color: "#ff9800", label: "In sospeso" },
        11: { icon: "help-circle", color: "#ff8a00", label: "Analisi" },
        12: { icon: "circle", color: "#ff9800", label: "Qualificazione" },
        5:  { icon: "circle", color: "#000000", label: "Applicata" },
        8:  { icon: "eye", color: "#000000", label: "Revisione" },
        6:  { icon: "circle-filled", color: "#000000", label: "Chiusa" },
        14: { icon: "ban", color: "#000000", label: "Cancellato" },
        13: { icon: "circle-x", color: "#e8590c", label: "Rifiutato" }
      }
    };

    const STATUS_ICON_SVG = {
      "circle-filled": '<circle cx="12" cy="12" r="8" fill="currentColor"></circle>',
      "circle": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"></circle>',
      "help-circle": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M9.75 9.4a2.45 2.45 0 1 1 3.65 2.13c-.9.5-1.4.92-1.4 1.97" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><circle cx="12" cy="16.6" r="1" fill="currentColor"></circle>',
      "calendar": '<rect x="4.5" y="5.5" width="15" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect><path d="M8 3.5v4M16 3.5v4M4.5 9.5h15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><rect x="8" y="12.5" width="3" height="3" rx=".5" fill="currentColor"></rect>',
      "check-filled": '<circle cx="12" cy="12" r="8" fill="currentColor"></circle><path d="m8.5 12.2 2.2 2.2 4.8-5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>',
      "eye": '<path d="M3.8 12s3-5 8.2-5 8.2 5 8.2 5-3 5-8.2 5-8.2-5-8.2-5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><circle cx="12" cy="12" r="2.2" fill="none" stroke="currentColor" stroke-width="1.8"></circle>',
      "ban": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="m6.4 6.4 11.2 11.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
      "circle-x": '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="m9.2 9.2 5.6 5.6m0-5.6-5.6 5.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>'
    };

    function normalizeItemKind(kind) {
      const value = String(kind || "").trim().toLowerCase();
      if (value === "chiamate" || value === "ticket") return "ticket";
      if (value === "problemi" || value === "problem") return "problem";
      if (value === "cambiamenti" || value === "change") return "change";
      return value;
    }

    function findStatusDefinition(kind, statusId, statusText) {
      const normalizedKind = normalizeItemKind(kind);
      const numericId = Number(statusId);
      const byId = STATUS_ICON_CONFIG[normalizedKind] || {};

      if (Number.isFinite(numericId) && byId[numericId]) {
        return byId[numericId];
      }

      const normalizedText = String(statusText || "").trim().toLowerCase();
      for (const definition of Object.values(byId)) {
        if (definition.label.toLowerCase() === normalizedText) {
          return definition;
        }
      }

      return {
        icon: "circle",
        color: "#9ca3af",
        label: statusText || "Stato sconosciuto"
      };
    }

    function createStatusIcon(kind, statusId, statusText) {
      const definition = findStatusDefinition(kind, statusId, statusText);
      const wrapper = document.createElement("span");
      wrapper.className = "state-icon";
      wrapper.style.setProperty("--state-color", definition.color);
      wrapper.title = statusText || definition.label;
      wrapper.setAttribute("role", "img");
      wrapper.setAttribute("aria-label", statusText || definition.label);

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("aria-hidden", "true");
      svg.innerHTML = STATUS_ICON_SVG[definition.icon] || STATUS_ICON_SVG.circle;
      wrapper.appendChild(svg);

      return wrapper;
    }

    function nowText() {
      return new Date().toLocaleTimeString("it-IT", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function setStatus(message, type) {
      const element = document.getElementById("status");
      element.textContent = message;
      element.className = "";
      if (type === "ok") element.classList.add("status-ok");
      if (type === "error") element.classList.add("status-error");
    }

    function setButtonLoading(isLoading) {
      const button = document.getElementById("force-refresh");
      button.disabled = isLoading;
      button.classList.toggle("loading", isLoading);
    }

    function updateCountdown() {
      const remainingSeconds = Math.ceil(
        Math.max(0, nextRefreshAt - Date.now()) / 1000
      );

      document.getElementById("countdown").textContent =
        "Prossimo aggiornamento tra " + remainingSeconds + " secondi";
    }

    function scheduleNextRefresh(delayMs = REFRESH_MS) {
      const safeDelay = Math.max(0, Number(delayMs) || 0);
      nextRefreshAt = Date.now() + safeDelay;

      if (refreshTimer) window.clearTimeout(refreshTimer);
      refreshTimer = window.setTimeout(() => refreshList("timer"), safeDelay);
      updateCountdown();
    }

    function forceRefresh() {
      if (isRefreshing) return;

      if (refreshTimer) {
        window.clearTimeout(refreshTimer);
        refreshTimer = null;
      }

      resetFiltersAndSorting(false);
      refreshList("manuale");
    }

    function mergeTotalsPatch(patch) {
      if (!patch || typeof patch !== "object") return;

      dashboardCache.totals = dashboardCache.totals || {};

      for (const category of ["chiamate", "problemi", "cambiamenti"]) {
        if (Object.prototype.hasOwnProperty.call(patch, category)) {
          dashboardCache.totals[category] = Number(patch[category]) || 0;
        }
      }
    }

    function mergeRelatedViews(relatedViews, timestamp = Date.now()) {
      if (!relatedViews || typeof relatedViews !== "object") return;

      dashboardCache.lists = dashboardCache.lists || {};
      dashboardCache.listUpdatedAt = dashboardCache.listUpdatedAt || {};

      for (const [relatedView, items] of Object.entries(relatedViews)) {
        dashboardCache.lists[relatedView] = Array.isArray(items) ? items : [];
        dashboardCache.listUpdatedAt[relatedView] = timestamp;
      }
    }

    function getCategoryForView(currentView) {
      if (["totali-aperti", "nuovi-incidenti", "nuove-richieste", "assegnati-a-me", "chiamate"].includes(currentView)) {
        return "chiamate";
      }

      if (currentView === "problemi") return "problemi";
      if (currentView === "cambiamenti") return "cambiamenti";
      return null;
    }

    function getNoteKindForView(currentView) {
      if (["totali-aperti", "nuovi-incidenti", "nuove-richieste", "assegnati-a-me", "chiamate"].includes(currentView)) {
        return "ticket";
      }

      if (currentView === "problemi") return "problem";
      if (currentView === "cambiamenti") return "change";
      return "ticket";
    }

    function getNoteIconSvg() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 4.5h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-7l-4.5 3v-3H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
          <path d="M8 8.5h8M8 12h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
        </svg>
      `;
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        cache: "no-store",
        ...options,
        headers: {
          "Content-Type": "application/json; charset=utf-8",
          ...(options.headers || {})
        }
      });

      let payload = null;
      const text = await response.text();
      if (text) {
        try {
          payload = JSON.parse(text);
        } catch {
          payload = text;
        }
      }

      if (!response.ok) {
        const message = payload && payload.message
          ? payload.message
          : (typeof payload === "string" && payload ? payload : "HTTP " + response.status);
        throw new Error(message);
      }

      return payload;
    }

    async function loadNoteCounts(shouldRender = true) {
      const kind = getNoteKindForView(view);

      try {
        const data = await requestJson(
          "/api/notes/counts?kind=" + encodeURIComponent(kind) + "&ts=" + Date.now(),
          { method: "GET" }
        );

        noteCounts = new Map();
        const counts = data && data.counts && typeof data.counts === "object"
          ? data.counts
          : {};

        for (const [itemId, count] of Object.entries(counts)) {
          noteCounts.set(String(itemId), Number(count) || 0);
        }

        if (shouldRender) renderCurrentRows();
      } catch (error) {
        console.error("Impossibile caricare i conteggi note", error);
      }
    }

    function updateNoteCount(itemId, count, shouldRender = true) {
      const key = String(itemId);
      const numericCount = Math.max(0, Number(count) || 0);

      if (numericCount > 0) {
        noteCounts.set(key, numericCount);
      } else {
        noteCounts.delete(key);
      }

      if (shouldRender) renderCurrentRows();
    }

    function setDrawerOpen(isOpen) {
      document.body.classList.toggle("drawer-open", isOpen);
      document.getElementById("notes-drawer").setAttribute("aria-hidden", String(!isOpen));
      document.getElementById("drawer-backdrop").setAttribute("aria-hidden", String(!isOpen));

      if (!isOpen) {
        currentDrawerItem = null;
        currentNotes = [];
        editingNoteId = null;
        draggedNoteId = null;
      }
    }

    function fillDrawerSummary(item) {
      document.getElementById("drawer-title").textContent = "Note · #" + item.id;
      document.getElementById("drawer-item-title").textContent = item.title || "(senza titolo)";
      document.getElementById("drawer-item-id").textContent = "#" + item.id;
      document.getElementById("drawer-item-status").textContent = item.status || "-";
      document.getElementById("drawer-item-type").textContent = item.type || "-";
      document.getElementById("drawer-item-updated").textContent = item.updatedAt || "-";
    }

    async function openNotesDrawer(item) {
      currentDrawerItem = item;
      currentNotes = [];
      editingNoteId = null;
      draggedNoteId = null;

      fillDrawerSummary(item);
      document.getElementById("new-note-text").value = "";
      document.getElementById("notes-list").innerHTML = '<div class="drawer-loading">Caricamento note...</div>';
      document.getElementById("drawer-note-count").textContent = "0";
      setDrawerOpen(true);

      window.setTimeout(() => document.getElementById("new-note-text").focus(), 180);
      await loadDrawerNotes();
    }

    function closeNotesDrawer() {
      setDrawerOpen(false);
    }

    async function loadDrawerNotes() {
      if (!currentDrawerItem) return;

      const kind = getNoteKindForView(view);
      const itemId = currentDrawerItem.id;

      try {
        const data = await requestJson(
          "/api/notes?kind=" + encodeURIComponent(kind) +
          "&itemId=" + encodeURIComponent(itemId) +
          "&ts=" + Date.now(),
          { method: "GET" }
        );

        if (!currentDrawerItem || String(currentDrawerItem.id) !== String(itemId)) return;

        currentNotes = Array.isArray(data.notes) ? data.notes : [];
        updateNoteCount(itemId, currentNotes.length, true);
        renderNotes();
      } catch (error) {
        console.error("Errore caricamento note", error);
        document.getElementById("notes-list").innerHTML =
          '<div class="drawer-error">Errore caricamento note: ' + escapeHtml(error.message) + '</div>';
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatNoteDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";

      return date.toLocaleString("it-IT", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderNotes() {
      const container = document.getElementById("notes-list");
      document.getElementById("drawer-note-count").textContent = String(currentNotes.length);

      if (!currentNotes.length) {
        container.innerHTML = '<div class="drawer-empty">Nessuna nota presente</div>';
        return;
      }

      container.innerHTML = "";

      for (const note of currentNotes) {
        const card = document.createElement("article");
        card.className = "note-card" + (note.completed ? " is-completed" : "");
        card.dataset.noteId = note.id;

        if (editingNoteId === note.id) {
          const textarea = document.createElement("textarea");
          textarea.className = "note-edit-textarea";
          textarea.maxLength = 10000;
          textarea.value = note.text || "";

          const actions = document.createElement("div");
          actions.className = "note-edit-actions";

          const cancel = document.createElement("button");
          cancel.className = "secondary-small-button";
          cancel.type = "button";
          cancel.textContent = "Annulla";
          cancel.addEventListener("click", () => {
            editingNoteId = null;
            renderNotes();
          });

          const save = document.createElement("button");
          save.className = "primary-small-button";
          save.type = "button";
          save.textContent = "Salva";
          save.addEventListener("click", async () => {
            const text = textarea.value.trim();
            if (!text) {
              textarea.focus();
              return;
            }

            save.disabled = true;
            await updateNote(note.id, { text });
          });

          actions.appendChild(cancel);
          actions.appendChild(save);
          card.appendChild(textarea);
          card.appendChild(actions);
          container.appendChild(card);
          window.setTimeout(() => textarea.focus(), 0);
          continue;
        }

        const top = document.createElement("div");
        top.className = "note-card-top";

        const dragHandle = document.createElement("button");
        dragHandle.className = "drag-handle";
        dragHandle.type = "button";
        dragHandle.draggable = true;
        dragHandle.title = "Trascina per riordinare";
        dragHandle.setAttribute("aria-label", "Trascina per riordinare");
        dragHandle.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="9" cy="7" r="1.4" fill="currentColor"></circle>
            <circle cx="15" cy="7" r="1.4" fill="currentColor"></circle>
            <circle cx="9" cy="12" r="1.4" fill="currentColor"></circle>
            <circle cx="15" cy="12" r="1.4" fill="currentColor"></circle>
            <circle cx="9" cy="17" r="1.4" fill="currentColor"></circle>
            <circle cx="15" cy="17" r="1.4" fill="currentColor"></circle>
          </svg>
        `;

        dragHandle.addEventListener("dragstart", event => {
          draggedNoteId = note.id;
          card.classList.add("is-dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", note.id);
        });

        dragHandle.addEventListener("dragend", () => {
          draggedNoteId = null;
          card.classList.remove("is-dragging");
          document.querySelectorAll(".note-card.drag-over").forEach(element => element.classList.remove("drag-over"));
        });

        card.addEventListener("dragover", event => {
          if (!draggedNoteId || draggedNoteId === note.id) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          card.classList.add("drag-over");
        });

        card.addEventListener("dragleave", () => card.classList.remove("drag-over"));

        card.addEventListener("drop", async event => {
          event.preventDefault();
          card.classList.remove("drag-over");
          if (!draggedNoteId || draggedNoteId === note.id) return;
          await moveNoteBefore(draggedNoteId, note.id);
        });

        const contentWrap = document.createElement("div");
        contentWrap.className = "note-content-wrap";

        const text = document.createElement("p");
        text.className = "note-text";
        text.textContent = note.text || "";

        const date = document.createElement("div");
        date.className = "note-date";
        date.textContent = "Aggiornata " + formatNoteDate(note.updatedAt || note.createdAt);

        contentWrap.appendChild(text);
        contentWrap.appendChild(date);
        top.appendChild(dragHandle);
        top.appendChild(contentWrap);

        const actions = document.createElement("div");
        actions.className = "note-actions";

        const complete = document.createElement("button");
        complete.className = "note-action-button complete";
        complete.type = "button";
        complete.textContent = note.completed ? "Riapri" : "Completa";
        complete.addEventListener("click", () => updateNote(note.id, { completed: !note.completed }));

        const edit = document.createElement("button");
        edit.className = "note-action-button";
        edit.type = "button";
        edit.textContent = "Modifica";
        edit.addEventListener("click", () => {
          editingNoteId = note.id;
          renderNotes();
        });

        const remove = document.createElement("button");
        remove.className = "note-action-button delete";
        remove.type = "button";
        remove.textContent = "Elimina";
        remove.addEventListener("click", () => deleteNote(note.id));

        actions.appendChild(complete);
        actions.appendChild(edit);
        actions.appendChild(remove);
        card.appendChild(top);
        card.appendChild(actions);
        container.appendChild(card);
      }
    }

    async function addNote() {
      if (!currentDrawerItem) return;

      const textarea = document.getElementById("new-note-text");
      const button = document.getElementById("add-note");
      const text = textarea.value.trim();
      if (!text) {
        textarea.focus();
        return;
      }

      button.disabled = true;

      try {
        const data = await requestJson("/api/notes", {
          method: "POST",
          body: JSON.stringify({
            kind: getNoteKindForView(view),
            itemId: currentDrawerItem.id,
            text
          })
        });

        currentNotes = Array.isArray(data.notes) ? data.notes : [];
        textarea.value = "";
        updateNoteCount(currentDrawerItem.id, currentNotes.length, true);
        renderNotes();
        textarea.focus();
      } catch (error) {
        window.alert("Impossibile aggiungere la nota: " + error.message);
      } finally {
        button.disabled = false;
      }
    }

    async function updateNote(noteId, patch) {
      try {
        const data = await requestJson("/api/notes/" + encodeURIComponent(noteId), {
          method: "PUT",
          body: JSON.stringify(patch)
        });

        currentNotes = Array.isArray(data.notes) ? data.notes : [];
        editingNoteId = null;
        updateNoteCount(currentDrawerItem.id, currentNotes.length, true);
        renderNotes();
      } catch (error) {
        window.alert("Impossibile aggiornare la nota: " + error.message);
      }
    }

    async function deleteNote(noteId) {
      if (!window.confirm("Eliminare definitivamente questa nota?")) return;

      try {
        const data = await requestJson("/api/notes/" + encodeURIComponent(noteId), {
          method: "DELETE"
        });

        currentNotes = Array.isArray(data.notes) ? data.notes : [];
        updateNoteCount(currentDrawerItem.id, currentNotes.length, true);
        renderNotes();
      } catch (error) {
        window.alert("Impossibile eliminare la nota: " + error.message);
      }
    }

    async function moveNoteBefore(sourceId, targetId) {
      const sourceIndex = currentNotes.findIndex(note => note.id === sourceId);
      const targetIndex = currentNotes.findIndex(note => note.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0 || sourceIndex === targetIndex) return;

      const previousOrder = currentNotes.slice();
      const nextNotes = currentNotes.slice();
      const [moved] = nextNotes.splice(sourceIndex, 1);
      const adjustedTarget = nextNotes.findIndex(note => note.id === targetId);
      nextNotes.splice(adjustedTarget, 0, moved);
      currentNotes = nextNotes;
      renderNotes();

      try {
        const data = await requestJson("/api/notes/reorder", {
          method: "POST",
          body: JSON.stringify({
            kind: getNoteKindForView(view),
            itemId: currentDrawerItem.id,
            ids: currentNotes.map(note => note.id)
          })
        });

        currentNotes = Array.isArray(data.notes) ? data.notes : currentNotes;
        renderNotes();
      } catch (error) {
        currentNotes = previousOrder;
        renderNotes();
        window.alert("Impossibile riordinare le note: " + error.message);
      }
    }

    function getActivityCountsByParent(category) {
      const counts = new Map();
      const tasks = dashboardCache.tasks && Array.isArray(dashboardCache.tasks[category])
        ? dashboardCache.tasks[category]
        : [];

      for (const task of tasks) {
        const key = String(task.parentId);
        counts.set(key, (counts.get(key) || 0) + 1);
      }

      return counts;
    }

    function normalizeFilterValue(value) {
      return String(value ?? "").trim();
    }

    function normalizeSearchValue(value) {
      return normalizeFilterValue(value).toLocaleLowerCase("it-IT");
    }

    function uniqueSortedValues(items, propertyName) {
      const values = new Map();

      for (const item of items) {
        const original = normalizeFilterValue(item[propertyName]);
        if (!original || original === "-") continue;

        const key = normalizeSearchValue(original);
        if (!values.has(key)) values.set(key, original);
      }

      return Array.from(values.values()).sort((left, right) =>
        left.localeCompare(right, "it-IT", {
          sensitivity: "base",
          numeric: true
        })
      );
    }

    function rebuildSelectOptions(selectId, values, emptyLabel, selectedValue) {
      const select = document.getElementById(selectId);
      const normalizedSelection = normalizeFilterValue(selectedValue);

      select.innerHTML = "";

      const emptyOption = document.createElement("option");
      emptyOption.value = "";
      emptyOption.textContent = emptyLabel;
      select.appendChild(emptyOption);

      for (const value of values) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      }

      const selectionStillAvailable = Array.from(select.options).some(
        option => option.value === normalizedSelection
      );

      select.value = selectionStillAvailable ? normalizedSelection : "";
    }

    function rebuildFilterOptions() {
      rebuildSelectOptions(
        "filter-state",
        uniqueSortedValues(allItems, "status"),
        "Tutti gli stati",
        listState.state
      );

      rebuildSelectOptions(
        "filter-type",
        uniqueSortedValues(allItems, "type"),
        "Tutti i tipi",
        listState.type
      );

      listState.state = document.getElementById("filter-state").value;
      listState.type = document.getElementById("filter-type").value;
    }

    function parseDateForSort(value) {
      const text = normalizeFilterValue(value);
      if (!text || text === "-") return Number.NEGATIVE_INFINITY;

      const nativeTimestamp = Date.parse(text);
      if (Number.isFinite(nativeTimestamp)) return nativeTimestamp;

      const match = text.match(
        /^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/
      );

      if (!match) return Number.NEGATIVE_INFINITY;

      return new Date(
        Number(match[3]),
        Number(match[2]) - 1,
        Number(match[1]),
        Number(match[4] || 0),
        Number(match[5] || 0),
        Number(match[6] || 0)
      ).getTime();
    }

    function getSortValue(item, column) {
      switch (column) {
        case "id":
          return Number(item.id) || 0;
        case "title":
          return normalizeFilterValue(item.title);
        case "status":
          return normalizeFilterValue(item.status);
        case "type":
          return normalizeFilterValue(item.type);
        case "updatedAt":
          return parseDateForSort(item.updatedAt);
        default:
          return "";
      }
    }

    function compareSortValues(left, right, column) {
      const leftValue = getSortValue(left, column);
      const rightValue = getSortValue(right, column);

      if (typeof leftValue === "number" && typeof rightValue === "number") {
        return leftValue - rightValue;
      }

      return String(leftValue).localeCompare(String(rightValue), "it-IT", {
        sensitivity: "base",
        numeric: true
      });
    }

    function getVisibleItems() {
      const titleFilter = normalizeSearchValue(listState.title);
      const stateFilter = normalizeSearchValue(listState.state);
      const typeFilter = normalizeSearchValue(listState.type);

      const filtered = allItems.filter(item => {
        const titleMatches = !titleFilter ||
          normalizeSearchValue(item.title).includes(titleFilter);

        const stateMatches = !stateFilter ||
          normalizeSearchValue(item.status) === stateFilter;

        const typeMatches = !typeFilter ||
          normalizeSearchValue(item.type) === typeFilter;

        return titleMatches && stateMatches && typeMatches;
      });

      if (!listState.sortColumn) return filtered;

      const directionMultiplier = listState.sortDirection === "desc" ? -1 : 1;

      return filtered
        .map((item, originalIndex) => ({ item, originalIndex }))
        .sort((left, right) => {
          const result = compareSortValues(
            left.item,
            right.item,
            listState.sortColumn
          );

          return result === 0
            ? left.originalIndex - right.originalIndex
            : result * directionMultiplier;
        })
        .map(entry => entry.item);
    }

    function createSortHeader(label, column) {
      const th = document.createElement("th");
      th.className = "sortable-header";

      const button = document.createElement("button");
      button.type = "button";
      button.className = "sort-button";
      button.dataset.column = column;

      const active = listState.sortColumn === column;
      if (active) {
        button.classList.add("is-active");
        button.dataset.direction = listState.sortDirection;
      }

      button.setAttribute(
        "aria-label",
        active
          ? "Ordina " + label + " in senso " +
            (listState.sortDirection === "asc" ? "decrescente" : "crescente")
          : "Ordina per " + label
      );

      button.setAttribute(
        "aria-sort",
        active
          ? (listState.sortDirection === "asc" ? "ascending" : "descending")
          : "none"
      );

      const text = document.createElement("span");
      text.textContent = label;

      const icon = document.createElement("span");
      icon.className = "sort-icon";
      icon.setAttribute("aria-hidden", "true");
      icon.innerHTML = `
        <svg viewBox="0 0 24 24">
          <path d="m7 14 5-5 5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      `;

      button.appendChild(text);
      button.appendChild(icon);

      button.addEventListener("click", () => {
        if (listState.sortColumn === column) {
          listState.sortDirection = listState.sortDirection === "asc"
            ? "desc"
            : "asc";
        } else {
          listState.sortColumn = column;
          listState.sortDirection = "asc";
        }

        renderCurrentRows();
      });

      th.appendChild(button);
      return th;
    }

    function renderCurrentRows() {
      const visibleItems = getVisibleItems();
      const container = document.getElementById("table-container");
      const category = getCategoryForView(view);
      const activityCounts = getActivityCountsByParent(category);
      const totalCount = allItems.length;
      const hasActiveView =
        Boolean(listState.title || listState.state || listState.type || listState.sortColumn);

      const countElement = document.getElementById("item-count");
      countElement.textContent = visibleItems.length === totalCount
        ? String(totalCount)
        : visibleItems.length + " / " + totalCount;
      countElement.title = hasActiveView
        ? visibleItems.length + " elementi visualizzati su " + totalCount
        : totalCount + " elementi";

      if (!visibleItems.length) {
        container.innerHTML = '<div class="empty">Nessun elemento trovato</div>';
        return;
      }

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const tbody = document.createElement("tbody");
      const headerRow = document.createElement("tr");

      [
        ["ID", "id"],
        ["Titolo", "title"],
        ["Stato", "status"],
        ["Tipo", "type"],
        ["Aggiornato", "updatedAt"]
      ].forEach(([label, column]) => {
        headerRow.appendChild(createSortHeader(label, column));
      });

      const notesHeader = document.createElement("th");
      notesHeader.className = "notes-header";
      notesHeader.scope = "col";
      notesHeader.textContent = "Note";
      headerRow.appendChild(notesHeader);

      thead.appendChild(headerRow);

      for (const item of visibleItems) {
        const row = document.createElement("tr");
        row.dataset.url = item.url || "";
        row.tabIndex = 0;
        row.setAttribute("role", "link");
        row.setAttribute("aria-label", "Apri " + (item.title || "elemento GLPI"));

        const openItem = () => {
          if (!item.url) return;
          window.open(item.url, "_blank", "noopener,noreferrer");
        };

        row.addEventListener("click", event => {
          if (event.target.closest("a, button, input, select")) return;
          openItem();
        });

        row.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openItem();
          }
        });

        const idCell = document.createElement("td");
        idCell.className = "id-cell";
        idCell.textContent = "#" + item.id;

        const titleCell = document.createElement("td");
        const titleContent = document.createElement("div");
        titleContent.className = "title-cell-content";

        titleContent.appendChild(
          createStatusIcon(
            item.kind || category,
            item.statusId,
            item.status
          )
        );

        const link = document.createElement("a");
        link.className = "title-link";
        link.href = item.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = item.title || "(senza titolo)";
        titleContent.appendChild(link);

        const activityCount = activityCounts.get(String(item.id)) || 0;

        if (activityCount > 0) {
          const badge = document.createElement("span");
          badge.className = "activity-badge";
          badge.textContent = String(activityCount);
          badge.title = activityCount === 1
            ? "1 attività assegnata"
            : activityCount + " attività assegnate";
          badge.setAttribute("aria-label", badge.title);
          titleContent.appendChild(badge);
        }

        titleCell.appendChild(titleContent);

        const statusCell = document.createElement("td");
        statusCell.className = "secondary";
        statusCell.textContent = item.status || "-";

        const typeCell = document.createElement("td");
        typeCell.className = "secondary";
        typeCell.textContent = item.type || "-";

        const dateCell = document.createElement("td");
        dateCell.className = "secondary";
        dateCell.textContent = item.updatedAt || "-";

        const notesCell = document.createElement("td");
        notesCell.className = "notes-cell";

        const notesButton = document.createElement("button");
        notesButton.className = "notes-button";
        notesButton.type = "button";
        notesButton.innerHTML = getNoteIconSvg();
        notesButton.title = "Apri note";
        notesButton.setAttribute("aria-label", "Apri note per " + (item.title || "elemento GLPI"));
        notesButton.addEventListener("click", event => {
          event.stopPropagation();
          openNotesDrawer(item);
        });

        const noteCount = noteCounts.get(String(item.id)) || 0;
        if (noteCount > 0) {
          const noteBadge = document.createElement("span");
          noteBadge.className = "notes-count-badge";
          noteBadge.textContent = String(noteCount);
          noteBadge.setAttribute("aria-hidden", "true");
          notesButton.appendChild(noteBadge);
          notesButton.title = noteCount === 1 ? "1 nota" : noteCount + " note";
        }

        notesCell.appendChild(notesButton);

        row.appendChild(idCell);
        row.appendChild(titleCell);
        row.appendChild(statusCell);
        row.appendChild(typeCell);
        row.appendChild(dateCell);
        row.appendChild(notesCell);
        tbody.appendChild(row);
      }

      table.appendChild(thead);
      table.appendChild(tbody);
      container.innerHTML = "";
      container.appendChild(table);
    }

    function setRows(items, preserveControls = true) {
      allItems = Array.isArray(items) ? items.slice() : [];

      if (!preserveControls) {
        resetFiltersAndSorting(false);
      }

      rebuildFilterOptions();
      renderCurrentRows();
    }

    function resetFiltersAndSorting(shouldRender = true) {
      listState.title = "";
      listState.state = "";
      listState.type = "";
      listState.sortColumn = null;
      listState.sortDirection = "asc";

      const titleInput = document.getElementById("filter-title");
      const stateSelect = document.getElementById("filter-state");
      const typeSelect = document.getElementById("filter-type");

      if (titleInput) titleInput.value = "";
      if (stateSelect) stateSelect.value = "";
      if (typeSelect) typeSelect.value = "";

      if (shouldRender) renderCurrentRows();
    }

    async function readErrorDetails(response) {
      try {
        const contentType = response.headers.get("content-type") || "";
        return contentType.includes("application/json")
          ? await response.json()
          : await response.text();
      } catch (error) {
        return "Impossibile leggere il dettaglio errore: " + error.message;
      }
    }

    function updateCacheFromResponse(data) {
      const timestamp = Date.now();

      mergeRelatedViews(data.relatedViews, timestamp);
      mergeTotalsPatch(data.totalsPatch);

      if (data.tasksPatch && typeof data.tasksPatch === "object") {
        dashboardCache.tasks = dashboardCache.tasks || {};
        dashboardCache.categoryUpdatedAt = dashboardCache.categoryUpdatedAt || {};

        for (const category of ["chiamate", "problemi", "cambiamenti"]) {
          if (Object.prototype.hasOwnProperty.call(data.tasksPatch, category)) {
            dashboardCache.tasks[category] = Array.isArray(data.tasksPatch[category])
              ? data.tasksPatch[category]
              : [];
            dashboardCache.categoryUpdatedAt[category] = timestamp;
          }
        }
      }

      if (data.stats) {
        dashboardCache.stats = data.stats;
      }

      saveCache();
    }

    async function refreshList(source) {
      if (isRefreshing) return;

      isRefreshing = true;
      setButtonLoading(true);
      setStatus("Aggiornamento in corso...", "info");

      try {
        const response = await fetch(
          "/api/list?view=" + encodeURIComponent(view) + "&ts=" + Date.now(),
          {
            method: "GET",
            cache: "no-store"
          }
        );

        if (!response.ok) {
          const details = await readErrorDetails(response);
          throw {
            message: "HTTP " + response.status + " " + response.statusText,
            details
          };
        }

        const data = await response.json();
        updateCacheFromResponse(data);
        setRows(
          Array.isArray(data.items) ? data.items : [],
          source === "timer"
        );

        await loadNoteCounts(true);

        setStatus(
          "Aggiornato alle " + (data.aggiornatoAlle || nowText()),
          "ok"
        );
      } catch (error) {
        console.error("Errore elenco", error);
        setStatus(
          "Errore aggiornamento: " + (error.message || String(error)),
          "error"
        );
      } finally {
        isRefreshing = false;
        setButtonLoading(false);
        scheduleNextRefresh();
      }
    }

    function getNavigationType() {
      const entries = performance.getEntriesByType
        ? performance.getEntriesByType("navigation")
        : [];

      return entries.length ? entries[0].type : "navigate";
    }

    function initializeList() {
      resetFiltersAndSorting(false);

      const navigationType = getNavigationType();
      const cachedItems = dashboardCache.lists && dashboardCache.lists[view];
      const cacheAvailable = Array.isArray(cachedItems);

      if (cacheAvailable) {
        setRows(cachedItems, false);
        loadNoteCounts(true);

        const cachedTimestamp = Number(
          dashboardCache.listUpdatedAt && dashboardCache.listUpdatedAt[view]
        );

        const cachedTime = Number.isFinite(cachedTimestamp) && cachedTimestamp > 0
          ? new Date(cachedTimestamp).toLocaleTimeString("it-IT", {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit"
            })
          : nowText();

        setStatus("Dati disponibili alle " + cachedTime, "ok");
      }

      // Normal navigation from the dashboard reuses the already loaded data.
      // A real browser reload intentionally refreshes only this resource type.
      if (navigationType !== "reload" && cacheAvailable) {
        scheduleNextRefresh();
        return;
      }

      refreshList("iniziale");
    }

    document.getElementById("force-refresh").addEventListener("click", forceRefresh);

    document.getElementById("filter-title").addEventListener("input", event => {
      listState.title = event.target.value;
      renderCurrentRows();
    });

    document.getElementById("filter-state").addEventListener("change", event => {
      listState.state = event.target.value;
      renderCurrentRows();
    });

    document.getElementById("filter-type").addEventListener("change", event => {
      listState.type = event.target.value;
      renderCurrentRows();
    });

    document.getElementById("reset-filters").addEventListener("click", () => {
      resetFiltersAndSorting(true);
      document.getElementById("filter-title").focus();
    });

    document.getElementById("drawer-close").addEventListener("click", closeNotesDrawer);
    document.getElementById("drawer-backdrop").addEventListener("click", closeNotesDrawer);
    document.getElementById("add-note").addEventListener("click", addNote);

    document.getElementById("new-note-text").addEventListener("keydown", event => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        addNote();
      }
    });

    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && document.body.classList.contains("drawer-open")) {
        closeNotesDrawer();
      }
    });

    window.setInterval(updateCountdown, 500);

    window.addEventListener("pageshow", function (event) {
      if (!event.persisted) return;

      const latestCache = readCache();
      if (!latestCache) return;

      dashboardCache = latestCache;
      const cachedItems = dashboardCache.lists && dashboardCache.lists[view];
      if (Array.isArray(cachedItems)) {
        setRows(cachedItems, true);
        loadNoteCounts(true);
      }
    });

    initializeList();
  </script>
